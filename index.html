<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KDP Diagramador IA</title>

<!-- Mammoth.js para parsear DOCX -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<!-- FileSaver.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<!-- docx.js para exportar DOCX -->
<script src="https://unpkg.com/docx@8.2.2/build/index.js"></script>
<!-- idb-keyval para persistência -->
<script type="module">
  import { get, set, del } from 'https://unpkg.com/idb-keyval@6/dist/index.js';
  window.idbGet = get; window.idbSet = set; window.idbDel = del;
</script>
<!-- React + Babel -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;1,400&display=swap');

  :root {
    --ink: #1a1a2e;
    --ink-light: #4a4a6a;
    --paper: #faf9f7;
    --paper-dark: #f0ede8;
    --accent: #c9884e;
    --accent-dark: #a8693a;
    --teal: #2d7d7d;
    --teal-light: #e8f5f5;
    --border: #e2ddd6;
    --white: #ffffff;
    --shadow: 0 4px 24px rgba(26,26,46,0.10);
    --shadow-lg: 0 12px 48px rgba(26,26,46,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--paper);
    color: var(--ink);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  #root { display: flex; flex-direction: column; height: 100vh; }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: 300px;
    background: var(--white);
    border-right: 1px solid var(--border);
    height: 100vh;
    overflow-y: auto;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 10;
  }

  .sidebar-header {
    padding: 20px 22px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--white);
    z-index: 5;
  }

  .sidebar-logo {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 900;
    color: var(--ink);
    letter-spacing: -0.5px;
    line-height: 1.2;
  }

  .sidebar-logo span { color: var(--accent); }

  .sidebar-body { padding: 16px 16px 24px; flex: 1; display: flex; flex-direction: column; gap: 16px; }

  /* ===== AI PANEL ===== */
  .ai-panel {
    background: linear-gradient(135deg, #e8f5f5 0%, #d4eeee 100%);
    border: 1px solid #b2dada;
    border-radius: 12px;
    padding: 14px;
    position: relative;
    overflow: hidden;
  }

  .ai-panel::before {
    content: '✦';
    position: absolute;
    top: 8px; right: 10px;
    font-size: 40px;
    color: var(--teal);
    opacity: 0.08;
    pointer-events: none;
  }

  .ai-panel-title {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--teal);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .ai-panel textarea {
    width: 100%;
    border: 1px solid #b2dada;
    border-radius: 8px;
    padding: 8px 10px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 12px;
    color: var(--ink);
    background: var(--white);
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 8px;
  }

  .ai-panel textarea:focus { border-color: var(--teal); }

  /* ===== BUTTONS ===== */
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    padding: 9px 14px;
    border-radius: 8px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    letter-spacing: 0.01em;
  }

  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .btn-primary {
    background: var(--teal);
    color: var(--white);
  }
  .btn-primary:hover:not(:disabled) { background: #256868; transform: translateY(-1px); }

  .btn-secondary {
    background: var(--ink);
    color: var(--white);
  }
  .btn-secondary:hover:not(:disabled) { background: #2d2d50; transform: translateY(-1px); }

  .btn-outline {
    background: var(--white);
    color: var(--ink);
    border: 1px solid var(--border);
  }
  .btn-outline:hover:not(:disabled) { background: var(--paper); }

  .btn-danger {
    background: #dc2626;
    color: var(--white);
  }
  .btn-danger:hover:not(:disabled) { background: #b91c1c; }

  /* ===== SETTINGS SECTION ===== */
  .settings-section {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
  }

  .settings-section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--ink-light);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }

  .field-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    gap: 8px;
  }

  .field-label {
    font-size: 12px;
    color: var(--ink);
    flex-shrink: 0;
    min-width: 80px;
  }

  .field-input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 12px;
    font-family: 'Source Sans 3', sans-serif;
    color: var(--ink);
    background: var(--white);
    outline: none;
    transition: border-color 0.15s;
  }

  .field-input:focus { border-color: var(--teal); }

  select.field-input { cursor: pointer; }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .toggle {
    width: 32px;
    height: 18px;
    background: var(--border);
    border-radius: 9px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    border: none;
    outline: none;
    flex-shrink: 0;
  }

  .toggle.on { background: var(--teal); }

  .toggle::after {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    background: white;
    border-radius: 50%;
    top: 2px;
    left: 2px;
    transition: left 0.2s;
  }

  .toggle.on::after { left: 16px; }

  /* ===== MAIN LAYOUT ===== */
  .app-layout {
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ===== PREVIEW ===== */
  .preview-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #d8d3cc;
    overflow: hidden;
    position: relative;
  }

  .preview-toolbar {
    height: 48px;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 5;
    flex-shrink: 0;
  }

  .preview-toolbar-title {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--ink-light);
    letter-spacing: 0.01em;
  }

  .preview-pages {
    flex: 1;
    overflow-y: auto;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .page-wrapper {
    background: white;
    box-shadow: var(--shadow-lg);
    border: 1px solid #d8d3cc;
  }

  /* ===== UPLOAD SCREEN ===== */
  .upload-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--paper);
    padding: 40px;
  }

  .upload-hero {
    text-align: center;
    margin-bottom: 40px;
  }

  .upload-hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 900;
    color: var(--ink);
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 12px;
  }

  .upload-hero h1 em {
    color: var(--accent);
    font-style: italic;
  }

  .upload-hero p {
    font-size: 16px;
    color: var(--ink-light);
    max-width: 420px;
    margin: 0 auto;
    line-height: 1.5;
  }

  .dropzone {
    width: 100%;
    max-width: 480px;
    background: var(--white);
    border: 2px dashed var(--border);
    border-radius: 20px;
    padding: 48px 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--accent);
    background: #fdf8f4;
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }

  .dropzone input[type=file] {
    position: absolute; inset: 0; width: 100%; height: 100%;
    opacity: 0; cursor: pointer;
  }

  .dropzone-icon {
    font-size: 56px;
    margin-bottom: 16px;
    line-height: 1;
  }

  .dropzone h3 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .dropzone p {
    font-size: 13px;
    color: var(--ink-light);
    margin-bottom: 20px;
  }

  .dropzone .choose-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--ink);
    color: white;
    font-family: 'Source Sans 3', sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 10px 22px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    pointer-events: none;
    transition: background 0.15s;
  }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(26,26,46,0.6);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .modal {
    background: var(--white);
    border-radius: 16px;
    padding: 28px;
    max-width: 440px;
    width: 100%;
    position: relative;
    box-shadow: var(--shadow-lg);
  }

  .modal h3 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 12px;
  }

  .modal p { font-size: 14px; color: var(--ink-light); margin-bottom: 10px; line-height: 1.5; }

  .modal-close {
    position: absolute;
    top: 14px; right: 14px;
    width: 28px; height: 28px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 18px;
    color: var(--ink-light);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: background 0.15s;
  }

  .modal-close:hover { background: var(--paper); }

  .modal input[type=password], .modal input[type=text] {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: var(--paper);
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 8px;
  }

  .modal input:focus { border-color: var(--teal); background: var(--white); }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  /* ===== PROGRESS BAR ===== */
  .progress-bar-wrap { background: #e2ddd6; border-radius: 99px; height: 6px; overflow: hidden; margin-top: 6px; }
  .progress-bar-fill { height: 100%; background: var(--teal); border-radius: 99px; transition: width 0.4s; }

  /* ===== LOADING TOAST ===== */
  .loading-toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--ink);
    color: white;
    padding: 12px 20px;
    border-radius: 40px;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: var(--shadow-lg);
    z-index: 100;
    animation: toast-in 0.3s ease;
  }

  @keyframes toast-in {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== EMPTY STATE ===== */
  .empty-preview {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    padding: 40px;
    color: var(--ink-light);
  }

  .empty-preview .book-icon {
    font-size: 64px;
    margin-bottom: 20px;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .empty-preview h3 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .empty-preview p { font-size: 14px; max-width: 300px; line-height: 1.5; }

  /* ===== ERROR BOX ===== */
  .error-icon-wrap {
    width: 48px; height: 48px;
    background: #fee2e2;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    margin: 0 auto 12px;
  }

  /* ===== DIVIDER ===== */
  .divider { height: 1px; background: var(--border); margin: 4px 0; }

  /* ===== PRINT ===== */
  @media print {
    .sidebar, .preview-toolbar, .loading-toast, .modal-overlay { display: none !important; }
    body, html { height: auto; overflow: visible; }
    .app-layout { display: block; }
    .preview-area { background: white; overflow: visible; }
    .preview-pages { padding: 0; overflow: visible; display: block; }
    .page-wrapper { box-shadow: none !important; border: none !important; margin: 0 !important; page-break-after: always; }
  }

  /* Badge */
  .badge {
    display: inline-flex;
    align-items: center;
    background: var(--accent);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 99px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-left: 6px;
  }

  .info-text { font-size: 11px; color: var(--ink-light); line-height: 1.4; margin-top: 4px; }
</style>

<body>
<div id="root"></div>

<script type="text/babel" data-type="module">
const { useState, useRef, useEffect, useMemo, useCallback } = React;

// ─────────────── CONSTANTS ───────────────
const TRIM_SIZES = {
  '5x8':     { name: '5" × 8"',         w: 5,    h: 8    },
  '5.5x8.5': { name: '5.5" × 8.5"',     w: 5.5,  h: 8.5  },
  '6x9':     { name: '6" × 9"',          w: 6,    h: 9    },
  'A4':      { name: 'A4 (8.27" × 11.69")', w: 8.27, h: 11.69 },
};

const DEFAULT_CONFIG = {
  trimSize: '6x9',
  fontFamily: 'Georgia, serif',
  fontSize: 11,
  lineHeight: 1.5,
  marginTop: 0.8,
  marginBottom: 0.8,
  marginLeft: 0.6,
  marginRight: 0.6,
  gutter: 0.15,
  title: '',
  author: '',
  dropCaps: true,
  firstLineIndent: 0.25,
  addTitlePage: false,
  addCopyrightPage: false,
  addTableOfContents: false,
};

// ─────────────── GEMINI API ───────────────
const GEMINI_MODEL = 'gemini-2.5-flash';
const GEMINI_BASE = 'https://generativelanguage.googleapis.com/v1beta';

async function geminiStream(apiKey, systemPrompt, userText, onChunk, signal) {
  const url = `${GEMINI_BASE}/models/${GEMINI_MODEL}:streamGenerateContent?alt=sse&key=${apiKey}`;
  const body = {
    system_instruction: { parts: [{ text: systemPrompt }] },
    contents: [{ role: 'user', parts: [{ text: userText }] }],
    generationConfig: { temperature: 0.3 },
  };
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
    signal,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    if (res.status === 429) throw new Error('Limite de requisições (429). Aguarde e clique em Continuar.');
    throw new Error(err?.error?.message || `Erro HTTP ${res.status}`);
  }
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buf = '';
  while (true) {
    if (signal?.aborted) { reader.cancel(); return; }
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim();
      if (data === '[DONE]') continue;
      try {
        const json = JSON.parse(data);
        const text = json.candidates?.[0]?.content?.parts?.[0]?.text || '';
        if (text) onChunk(text);
      } catch {}
    }
  }
}

async function geminiGenerate(apiKey, systemPrompt, userText, signal) {
  const url = `${GEMINI_BASE}/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
  const body = {
    system_instruction: { parts: [{ text: systemPrompt }] },
    contents: [{ role: 'user', parts: [{ text: userText }] }],
    generationConfig: { temperature: 0.2 },
  };
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
    signal,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    if (res.status === 429) throw new Error('Limite de requisições (429). Aguarde e tente novamente.');
    throw new Error(err?.error?.message || `Erro HTTP ${res.status}`);
  }
  const json = await res.json();
  return json.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

// ─────────────── DOCX PARSER ───────────────
async function parseDocx(file) {
  const arrayBuffer = await file.arrayBuffer();
  const result = await mammoth.convertToHtml({ arrayBuffer });
  const parser = new DOMParser();
  const doc = parser.parseFromString(result.value, 'text/html');
  const blocks = [];
  let isFirstAfterHeading = true;

  doc.body.childNodes.forEach(node => {
    if (node.nodeType !== 1) return;
    const el = node;
    const text = (el.textContent || '').trim();
    if (!text && el.tagName.toLowerCase() === 'p') return;

    let type = 'paragraph';
    const tag = el.tagName.toLowerCase();
    if (tag === 'h1') type = 'heading1';
    else if (tag === 'h2') type = 'heading2';
    else if (tag === 'h3') type = 'heading3';

    if (type === 'paragraph' && text.length < 50) {
      const up = text.toUpperCase();
      if (up.startsWith('CAPÍTULO') || up.startsWith('CHAPTER') || up.startsWith('PARTE ') || up.startsWith('PART ')) {
        type = 'heading1';
      }
    }

    let alignment = 'justify';
    if (type.startsWith('heading')) alignment = 'center';

    let isFirstOfSection = false;
    if (type.startsWith('heading')) {
      isFirstAfterHeading = true;
    } else if (type === 'paragraph') {
      isFirstOfSection = isFirstAfterHeading;
      isFirstAfterHeading = false;
    }

    blocks.push({ type, text, alignment, isFirstOfSection });
  });
  return blocks;
}

// ─────────────── DOCX EXPORT ───────────────
async function exportToDocx(blocks, config) {
  const { Document, Packer, Paragraph, TextRun, HeadingLevel, AlignmentType, Header, Footer, PageNumber } = docx;
  const inToTwip = n => Math.round(n * 1440);
  const dims = TRIM_SIZES[config.trimSize];

  const pageProps = {
    size: { width: inToTwip(dims.w), height: inToTwip(dims.h) },
    margin: {
      top: inToTwip(config.marginTop),
      bottom: inToTwip(config.marginBottom),
      left: inToTwip(config.marginLeft + config.gutter),
      right: inToTwip(config.marginRight),
    },
  };

  const children = blocks.map(block => {
    let heading;
    if (block.type === 'heading1') heading = HeadingLevel.HEADING_1;
    else if (block.type === 'heading2') heading = HeadingLevel.HEADING_2;
    else if (block.type === 'heading3') heading = HeadingLevel.HEADING_3;

    const runs = [];
    if (!heading && config.dropCaps && block.isFirstOfSection && block.text.length > 0) {
      runs.push(new TextRun({ text: block.text.charAt(0), size: config.fontSize * 6, bold: true }));
      runs.push(new TextRun({ text: block.text.substring(1), size: config.fontSize * 2 }));
    } else {
      runs.push(new TextRun({ text: block.text, size: config.fontSize * 2 }));
    }

    return new Paragraph({
      children: heading ? undefined : runs,
      text: heading ? block.text : undefined,
      heading,
      alignment: block.alignment === 'center' ? AlignmentType.CENTER : AlignmentType.JUSTIFIED,
      pageBreakBefore: block.type === 'heading1',
      indent: (!heading && config.firstLineIndent > 0 && !block.isFirstOfSection)
        ? { firstLine: inToTwip(config.firstLineIndent) }
        : undefined,
    });
  });

  const doc2 = new Document({
    sections: [{
      properties: { page: pageProps },
      headers: config.title ? {
        default: new Header({ children: [new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: config.title, italics: true, color: '888888', size: 18 })] })] }),
      } : undefined,
      footers: {
        default: new Footer({ children: [new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ children: [PageNumber.CURRENT], size: 18 })] })] }),
      },
      children,
    }],
    styles: {
      default: {
        document: {
          run: { font: config.fontFamily.split(',')[0].trim(), size: config.fontSize * 2 },
          paragraph: { spacing: { line: Math.round(config.lineHeight * 240) } },
        },
      },
    },
  });

  const blob = await Packer.toBlob(doc2);
  saveAs(blob, 'livro-formatado.docx');
}

function buildDiagramSystem(config, startPage, userPrompt) {
  const dims = TRIM_SIZES[config.trimSize];
  return `Você é um designer editorial premiado especialista em diagramação clássica de livros.
Sua tarefa: transformar texto cru em páginas HTML lindamente diagramadas.
NÃO ALTERE UMA PALAVRA sequer do texto original.

REGRAS ABSOLUTAS:
1. CADA PÁGINA = uma tag <article> com este estilo inline exato:
   <article style="width:${dims.w}in; min-height:${dims.h}in; padding:${config.marginTop}in ${config.marginRight}in ${config.marginBottom}in ${config.marginLeft + config.gutter}in; position:relative; box-sizing:border-box; background:#fff; color:#111; overflow:hidden; margin:0 auto 2rem auto; box-shadow:0 10px 30px rgba(0,0,0,0.12); border:1px solid #e5e7eb; page-break-after:always;">

2. PREENCHIMENTO: Cada página deve ter ~350-450 palavras. Preencha ao máximo antes de abrir nova página. NUNCA abra nova página para continuação de texto que cabe na atual.

3. CSS INLINE SEMPRE. Use estilos inline em cada elemento:
   - Parágrafo normal: style="font-family:${config.fontFamily}; font-size:${config.fontSize}pt; line-height:${config.lineHeight}; text-align:justify; text-indent:${config.firstLineIndent}in; margin:0 0 0 0;"
   - Título H1 (capítulo): style="font-family:${config.fontFamily}; font-size:${config.fontSize * 2}pt; text-align:center; font-weight:bold; margin:1in 0 0.5in 0; letter-spacing:-0.5px;"
   - H2/H3: proporcionais

4. DROP CAP: Primeiro parágrafo de cada capítulo deve ter capitular:
   <span style="float:left;font-size:${config.fontSize * 4}pt;line-height:0.75;margin-right:0.05in;font-family:${config.fontFamily};font-weight:bold;color:#333;">P</span>rimer letra assim...

5. NÚMERO DE PÁGINA: Em cada <article>, adicione ao final:
   <div style="position:absolute;bottom:0.4in;left:0;right:0;text-align:center;font-size:9pt;color:#888;font-family:${config.fontFamily};">NUMERO</div>
   Este lote começa na página ${startPage}. Incremente sequencialmente.

6. RETORNO PURO: Retorne APENAS as tags <article>...</article> em sequência. SEM markdown, SEM explicações.

INSTRUÇÃO DO USUÁRIO: ${userPrompt || 'Design editorial premium, elegante e impecável.'}`;
}

function buildCorrectionSystem() {
  return `Você é um designer editorial expert. Sua tarefa: aplicar a instrução do usuário ao HTML diagramado existente.

REGRAS:
1. Mantenha a estrutura de <article> exata com estilos inline.
2. NÃO altere o texto original.
3. Retorne APENAS o HTML puro completo, SEM markdown, SEM explicações.
4. Aplique SOMENTE o que foi pedido. Preserve todo o resto.
5. Retorne TODAS as páginas originais com as modificações.`;
}

// ─────────────── MAIN APP ───────────────
export default function App() {
  const [config, setConfig] = useState(DEFAULT_CONFIG);
  const [blocks, setBlocks] = useState(null);
  const [aiHtml, setAiHtml] = useState(null);
  const [loading, setLoading] = useState(false);
  const [aiLoading, setAiLoading] = useState(false);
  const [processedIndex, setProcessedIndex] = useState(0);
  const [apiKey, setApiKey] = useState('');
  const [errorMsg, setErrorMsg] = useState(null);
  const [showApiModal, setShowApiModal] = useState(false);
  const [showPdfWarning, setShowPdfWarning] = useState(false);
  const abortRef = useRef(null);

  // Restore from IDB
  useEffect(() => {
    (async () => {
      const savedKey = localStorage.getItem('kdp-apiKey') || '';
      setApiKey(savedKey);

      const b = await idbSafe.get('kdp-blocks');
      if (b) setBlocks(b);
      const h = await idbSafe.get('kdp-aiHtml');
      if (h) {
        setAiHtml(h);
        if (window.location.search.includes('print=true')) {
          setTimeout(() => window.print(), 1500);
        }
      }
      const p = await idbSafe.get('kdp-processedIndex');
      if (p != null) setProcessedIndex(p);
    })();
  }, []);

  useEffect(() => { if (blocks) idbSafe.set('kdp-blocks', blocks); }, [blocks]);
  useEffect(() => { if (aiHtml !== null) idbSafe.set('kdp-aiHtml', aiHtml); }, [aiHtml]);
  useEffect(() => { idbSafe.set('kdp-processedIndex', processedIndex); }, [processedIndex]);

  const handleFileLoaded = async (file) => {
    try {
      setLoading(true);
      const parsed = await parseDocx(file);
      setBlocks(parsed);
      setAiHtml(null);
      setProcessedIndex(0);
    } catch (e) {
      console.error(e);
      setErrorMsg('Erro ao ler o DOCX. Certifique-se de que é um documento Word válido (.docx).');
    } finally {
      setLoading(false);
    }
  };

  const requireApiKey = () => {
    if (!apiKey) {
      setShowApiModal(true);
      return false;
    }
    return true;
  };

  const handleDiagram = useCallback(async (userPrompt = '', startIdx = 0, baseHtml = '') => {
    if (!blocks) return;
    if (!requireApiKey()) return;

    if (abortRef.current) abortRef.current.abort();
    const controller = new AbortController();
    abortRef.current = controller;

    try {
      setAiLoading(true);
      setErrorMsg(null);

      let streamedData = baseHtml;
      let pageOffset = 1;

      if (startIdx === 0) {
        setAiHtml('');
        streamedData = '';
        setProcessedIndex(0);
      } else {
        const matchArr = (baseHtml || aiHtml || '').match(/<article/gi);
        pageOffset = matchArr ? matchArr.length + 1 : 1;
        streamedData = baseHtml || aiHtml || '';
      }

      const CHUNK_SIZE = 25;

      for (let i = startIdx; i < blocks.length; i += CHUNK_SIZE) {
        if (controller.signal.aborted) return;
        setProcessedIndex(i);

        const chunk = blocks.slice(i, i + CHUNK_SIZE);
        const rawText = chunk.map(b => b.text).join('\n\n');
        const sysPrompt = buildDiagramSystem(config, pageOffset, userPrompt);

        let chunkHtml = '';
        await geminiStream(
          apiKey,
          sysPrompt,
          `Texto Original para Diagramar:\n\n${rawText}`,
          text => {
            chunkHtml += text;
            streamedData += text;
            setAiHtml(streamedData);
          },
          controller.signal
        );

        const matchArr = chunkHtml.match(/<article/gi);
        pageOffset += matchArr ? matchArr.length : 0;
        setProcessedIndex(Math.min(i + CHUNK_SIZE, blocks.length));

        if (i + CHUNK_SIZE < blocks.length) {
          await new Promise(r => setTimeout(r, 1500));
        }
      }

      setProcessedIndex(blocks.length);
    } catch (e) {
      if (e.name === 'AbortError') return;
      console.error(e);
      setErrorMsg(e.message || 'Erro na diagramação por IA.');
    } finally {
      if (abortRef.current === controller) setAiLoading(false);
    }
  }, [blocks, config, apiKey, aiHtml]);

  const handleResume = useCallback(() => {
    handleDiagram('', processedIndex, aiHtml || '');
  }, [handleDiagram, processedIndex, aiHtml]);

  const handleApplyCorrection = useCallback(async (userPrompt) => {
    if (!aiHtml || !userPrompt.trim()) return;
    if (!requireApiKey()) return;

    if (abortRef.current) abortRef.current.abort();
    const controller = new AbortController();
    abortRef.current = controller;

    try {
      setAiLoading(true);
      setErrorMsg(null);

      const result = await geminiGenerate(
        apiKey,
        buildCorrectionSystem(),
        `HTML Atual:\n\n${aiHtml}\n\nInstrução de Correção:\n${userPrompt}\n\nAplique a correção e retorne o HTML completo modificado.`,
        controller.signal
      );

      const cleaned = result.replace(/```html/g, '').replace(/```/g, '').trim();
      setAiHtml(cleaned);
      // After correction, resume from where we were
      const matchArr = cleaned.match(/<article/gi);
      const pagesGenerated = matchArr ? matchArr.length : 0;
      // Keep processedIndex as is — pages are already styled
    } catch (e) {
      if (e.name === 'AbortError') return;
      console.error(e);
      setErrorMsg(e.message || 'Erro ao aplicar correção.');
    } finally {
      if (abortRef.current === controller) setAiLoading(false);
    }
  }, [aiHtml, apiKey]);

  const handleExportPdf = () => {
    try {
      if (window.self !== window.top) { setShowPdfWarning(true); return; }
      window.print();
    } catch { setShowPdfWarning(true); }
  };

  const handleExportDocx = async () => {
    if (!blocks) return;
    try {
      setLoading(true);
      await exportToDocx(blocks, config);
    } catch (e) {
      console.error(e);
      setErrorMsg('Erro ao gerar DOCX.');
    } finally {
      setLoading(false);
    }
  };

  if (!blocks) {
    return (
      <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
        <UploadScreen onFileLoaded={handleFileLoaded} loading={loading} />
        {showApiModal && <ApiKeyModal onClose={() => setShowApiModal(false)} apiKey={apiKey} setApiKey={setApiKey} />}
        {errorMsg && <ErrorModal msg={errorMsg} onClose={() => setErrorMsg(null)} />}
      </div>
    );
  }

  return (
    <div className="app-layout">
      <SettingsSidebar
        config={config}
        setConfig={setConfig}
        onDiagram={handleDiagram}
        onResume={handleResume}
        onApplyCorrection={handleApplyCorrection}
        onExportPdf={handleExportPdf}
        onExportDocx={handleExportDocx}
        aiLoading={aiLoading}
        blocks={blocks}
        processedIndex={processedIndex}
        onOpenApiModal={() => setShowApiModal(true)}
        onNewFile={() => { setBlocks(null); setAiHtml(null); setProcessedIndex(0); idbSafe.set('kdp-blocks', null); idbSafe.set('kdp-aiHtml', null); idbSafe.set('kdp-processedIndex', 0); }}
      />
      <BookPreview
        aiHtml={aiHtml}
        aiLoading={aiLoading}
        processedIndex={processedIndex}
        totalCount={blocks.length}
      />

      {aiLoading && (
        <div className="loading-toast">
          <div className="spinner" />
          <span>IA diagramando... {blocks ? Math.round((Math.max(processedIndex, 1) / blocks.length) * 100) : 0}%</span>
        </div>
      )}

      {showApiModal && <ApiKeyModal onClose={() => setShowApiModal(false)} apiKey={apiKey} setApiKey={setApiKey} />}
      {showPdfWarning && <PdfWarningModal onClose={() => setShowPdfWarning(false)} />}
      {errorMsg && <ErrorModal msg={errorMsg} onClose={() => setErrorMsg(null)} />}

      {loading && (
        <div style={{position:'fixed',inset:0,background:'rgba(255,255,255,0.8)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'}}>
          <div style={{textAlign:'center'}}>
            <div className="spinner" style={{width:40,height:40,borderWidth:4,margin:'0 auto 16px'}} />
            <p style={{fontFamily:'Playfair Display',fontSize:16,color:'var(--ink)'}}>Processando...</p>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
