<!DOCTYPE html>
<html lang="pt-BR" xml:lang="pt-BR">
<head>
<meta charset="UTF-8"/>

<title>KDP Diagramador IA</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#e8e4df;height:100vh;overflow:hidden}
#root{height:100vh;display:flex;flex-direction:column}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sb{width:280px;background:#1c1c1e;color:#f5f5f0;display:flex;flex-direction:column;flex-shrink:0;height:100vh;overflow:hidden}
.sb-head{padding:18px 16px 14px;border-bottom:1px solid #333}
.sb-logo{font-family:'Playfair Display',serif;font-size:17px;font-weight:900;letter-spacing:-0.3px;color:#f5f5f0}
.sb-logo em{color:#c9884e;font-style:normal}
.sb-newfile{font-size:11px;color:#888;background:none;border:none;cursor:pointer;margin-top:5px;padding:0;text-decoration:underline;display:block}
.sb-newfile:hover{color:#c9884e}
.sb-body{flex:1;overflow-y:auto;padding:12px}
.sb-body::-webkit-scrollbar{width:4px}
.sb-body::-webkit-scrollbar-thumb{background:#444;border-radius:2px}

.sec{margin-bottom:12px;background:#262628;border-radius:8px;overflow:hidden}
.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#888;padding:10px 12px 6px}
.sec-body{padding:0 12px 12px;display:flex;flex-direction:column;gap:6px}

.f-row{display:flex;align-items:center;gap:8px}
.f-label{font-size:11px;color:#aaa;width:72px;flex-shrink:0}
.f-input{flex:1;background:#1c1c1e;border:1px solid #3a3a3c;border-radius:5px;padding:4px 8px;font-size:12px;color:#f5f5f0;outline:none;font-family:inherit}
.f-input:focus{border-color:#c9884e}
select.f-input{cursor:pointer}

.tog-row{display:flex;align-items:center;justify-content:space-between}
.tog-label{font-size:11px;color:#aaa}
.tog{width:30px;height:17px;background:#3a3a3c;border-radius:9px;position:relative;cursor:pointer;border:none;transition:background .2s;flex-shrink:0}
.tog.on{background:#c9884e}
.tog::after{content:'';position:absolute;width:13px;height:13px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .18s}
.tog.on::after{left:15px}

.btn{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;padding:8px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit;letter-spacing:0.01em}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-gold{background:#c9884e;color:#fff}
.btn-gold:hover:not(:disabled){background:#b8773f}
.btn-dark{background:#3a3a3c;color:#f5f5f0}
.btn-dark:hover:not(:disabled){background:#4a4a4c}
.btn-ghost{background:transparent;color:#aaa;border:1px solid #3a3a3c}
.btn-ghost:hover:not(:disabled){background:#262628;color:#f5f5f0}
.btn-red{background:#7f1d1d;color:#fca5a5}
.btn-red:hover:not(:disabled){background:#991b1b}
.btn-green{background:#14532d;color:#86efac}
.btn-green:hover:not(:disabled){background:#166534}

.prog-wrap{background:#3a3a3c;border-radius:99px;height:4px;overflow:hidden;margin-top:2px}
.prog-fill{height:100%;background:#c9884e;border-radius:99px;transition:width .4s}
.prog-label{display:flex;justify-content:space-between;font-size:10px;color:#888;margin-bottom:3px}

.ai-ta{width:100%;background:#1c1c1e;border:1px solid #3a3a3c;border-radius:6px;padding:8px 10px;font-size:12px;color:#f5f5f0;font-family:inherit;resize:vertical;min-height:72px;outline:none;line-height:1.5}
.ai-ta:focus{border-color:#c9884e}
.ai-ta::placeholder{color:#555}

.div{height:1px;background:#333;margin:4px 0}

/* PREVIEW */
.pv{flex:1;display:flex;flex-direction:column;background:#d6d1cb;overflow:hidden}
.pv-bar{height:44px;background:#fff;border-bottom:1px solid #ddd;display:flex;align-items:center;justify-content:space-between;padding:0 18px;flex-shrink:0;z-index:5}
.pv-bar-title{font-size:13px;font-weight:600;color:#666;font-family:'Playfair Display',serif}
.pv-scroll{flex:1;overflow-y:auto;padding:28px 20px;display:flex;flex-direction:column;align-items:center;gap:32px}
.pv-scroll::-webkit-scrollbar{width:6px}
.pv-scroll::-webkit-scrollbar-thumb{background:#bbb;border-radius:3px}

/* BOOK PAGE */
.pg-wrap{background:#fff;box-shadow:0 4px 24px rgba(0,0,0,.18);flex-shrink:0;overflow:hidden;font-size:11.5pt;line-height:1.55;position:relative}
.pg-wrap.overflow-warn{box-shadow:0 0 0 3px #ef4444,0 4px 24px rgba(0,0,0,.18)}
.pg-wrap.overflow-warn::after{content:'⚠ Página com texto excedente';position:absolute;bottom:-22px;left:0;right:0;text-align:center;font-size:10px;color:#ef4444;font-family:system-ui,sans-serif;font-weight:600;letter-spacing:.02em}

page{
  display:block;width:576px;height:864px;min-height:864px;
  padding:77px 58px 77px 72px;position:relative;background:#fff;color:#111;
  overflow:visible;font-family:'EB Garamond',Georgia,serif;font-size:11.5pt;line-height:1.55;box-sizing:border-box;
}
page p{text-align:justify;text-indent:1.8em;margin:0;orphans:3;widows:3;hyphens:manual;word-break:normal;overflow-wrap:normal;}
page p.no-indent{text-indent:0}
page p.center{text-align:center;text-indent:0}
page p.ornament{text-align:center;text-indent:0;color:#888;letter-spacing:.2em;font-size:10pt;margin:10px 0}
page.chapter-page{padding-top:140px}
page h1{font-family:'Playfair Display',serif;font-size:22pt;font-weight:900;text-align:center;margin:0 0 6px 0;letter-spacing:-0.5px;line-height:1.15;color:#1a1a1a;}
page .chapter-num{font-family:'EB Garamond',serif;font-size:10pt;text-align:center;letter-spacing:.25em;text-transform:uppercase;color:#999;margin-bottom:18px;}
page .chapter-rule{width:36px;height:1.5px;background:#c9884e;margin:18px auto 32px;display:block;}
page h2{font-family:'Playfair Display',serif;font-size:13pt;font-weight:700;text-align:center;margin:28px 0 10px;color:#1a1a1a;}
page h3{font-family:'EB Garamond',serif;font-size:11pt;font-weight:500;font-style:italic;text-align:center;margin:20px 0 8px;color:#555;}
page blockquote{margin:24px 24px 24px 28px;font-style:italic;color:#444;font-size:10.5pt;line-height:1.6;border-left:2px solid #c9884e;padding-left:14px;text-indent:0;}
page blockquote cite{display:block;font-style:normal;font-size:9.5pt;color:#888;margin-top:6px;text-align:right;}
page .epigraph{margin:32px 40px 40px;font-style:italic;color:#555;font-size:10pt;line-height:1.65;text-align:center;text-indent:0;}
page .epigraph cite{display:block;font-style:normal;font-size:9pt;color:#888;margin-top:8px;}
page p.dropcap::first-letter{font-family:'Playfair Display',serif;font-size:3.8em;font-weight:900;float:left;line-height:.78;margin-right:.06em;margin-top:.04em;color:#1a1a1a;}
page .pgnum{display:none;}
page.toc-page{padding-top:100px;}
page.toc-page h2{font-family:'Playfair Display',serif;font-size:18pt;font-weight:700;text-align:center;margin:0 0 32px 0;color:#1a1a1a;letter-spacing:-0.3px;}
page .runhead{position:absolute;top:26px;left:0;right:0;text-align:center;font-size:8.5pt;color:#bbb;font-family:'EB Garamond',serif;font-style:italic;letter-spacing:.04em;}
page.chapter-page .runhead{display:none}
page.toc-page .runhead{display:none}
page.title-page .runhead{display:none}
page.copyright-page .runhead{display:none}
page .toc-entry{display:flex;justify-content:space-between;align-items:baseline;font-size:10.5pt;margin-bottom:6px;text-indent:0;}
page .toc-entry .toc-dots{flex:1;border-bottom:1px dotted #ccc;margin:0 6px;position:relative;top:-3px}
page .toc-entry.toc-part{font-weight:700;font-family:'Playfair Display',serif;margin-top:14px;font-size:11pt}
page .toc-entry.toc-cap{padding-left:14px;color:#444}
page.title-page{padding-top:160px;text-align:center}
page.title-page h1{font-size:30pt;margin-bottom:8px}
page.title-page .subtitle{font-style:italic;color:#666;font-size:12pt;margin-bottom:48px}
page.title-page .author{font-family:'Playfair Display',serif;font-size:14pt;font-weight:700;color:#333}
page.copyright-page{padding-top:200px;font-size:9pt;color:#666;line-height:1.8}
page.copyright-page p{text-indent:0;text-align:center}

/* UPLOAD / WRITE SCREEN */
.home-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f5f2ee;padding:40px;gap:0}
.home-hero{text-align:center;margin-bottom:36px}
.home-hero h1{font-family:'Playfair Display',serif;font-size:44px;font-weight:900;color:#1c1c1e;letter-spacing:-2px;line-height:1;margin-bottom:10px}
.home-hero h1 em{color:#c9884e;font-style:italic}
.home-hero p{font-size:15px;color:#666;max-width:440px;margin:0 auto;line-height:1.5}

.mode-cards{display:flex;gap:16px;width:100%;max-width:740px;margin-bottom:24px}
.mode-card{flex:1;background:#fff;border:2px solid #e5e0da;border-radius:16px;padding:28px 24px;cursor:pointer;transition:all .2s;text-align:left}
.mode-card:hover{border-color:#c9884e;box-shadow:0 8px 32px rgba(201,136,78,.12);transform:translateY(-2px)}
.mode-card.active{border-color:#c9884e;background:#fdf9f5}
.mc-icon{font-size:36px;margin-bottom:12px}
.mc-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:#1c1c1e;margin-bottom:6px}
.mc-desc{font-size:13px;color:#888;line-height:1.5}

.mode-panel{width:100%;max-width:740px}

/* DROPZONE */
.dropzone{width:100%;background:#fff;border:2px dashed #ddd;border-radius:16px;padding:44px 28px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.dropzone:hover,.dropzone.drag{border-color:#c9884e;background:#fdf9f5;transform:translateY(-2px);box-shadow:0 8px 32px rgba(201,136,78,.12)}
.dropzone input{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}
.dz-icon{font-size:52px;margin-bottom:12px}
.dz-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#1c1c1e;margin-bottom:6px}
.dz-sub{font-size:13px;color:#999;margin-bottom:18px}
.dz-btn{display:inline-flex;align-items:center;gap:6px;background:#1c1c1e;color:#fff;font-size:13px;font-weight:600;padding:9px 20px;border-radius:8px;border:none;pointer-events:none}

/* WRITE FORM */
.write-form{background:#fff;border-radius:16px;padding:28px 24px;display:flex;flex-direction:column;gap:14px}
.wf-row{display:flex;flex-direction:column;gap:5px}
.wf-label{font-size:12px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.05em}
.wf-input{border:1px solid #e0dbd5;border-radius:8px;padding:9px 12px;font-size:14px;color:#1c1c1e;font-family:inherit;outline:none;background:#fafaf9}
.wf-input:focus{border-color:#c9884e}
.wf-ta{border:1px solid #e0dbd5;border-radius:8px;padding:9px 12px;font-size:13px;color:#1c1c1e;font-family:inherit;outline:none;background:#fafaf9;resize:vertical;min-height:80px;line-height:1.5}
.wf-ta:focus{border-color:#c9884e}
.wf-row2{display:flex;gap:12px}
.wf-row2 .wf-row{flex:1}
select.wf-input{cursor:pointer}

/* OUTLINE PANEL */
.outline-panel{background:#fff;border-radius:16px;padding:24px;max-height:420px;overflow-y:auto}
.outline-panel h3{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#1c1c1e;margin-bottom:14px}
.ol-chapter{padding:10px 12px;border:1px solid #e5e0da;border-radius:8px;margin-bottom:8px;cursor:pointer;transition:background .15s}
.ol-chapter:hover{background:#fdf9f5}
.ol-chapter.writing{background:#fdf3e7;border-color:#c9884e}
.ol-chapter.done{background:#f0fdf4;border-color:#86efac}
.ol-ch-title{font-size:13px;font-weight:600;color:#1c1c1e}
.ol-ch-meta{font-size:11px;color:#aaa;margin-top:2px}
.ol-status{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;float:right;padding:2px 7px;border-radius:10px}
.ol-status.done{background:#dcfce7;color:#166534}
.ol-status.writing{background:#fef3c7;color:#92400e}
.ol-status.pending{background:#f3f4f6;color:#9ca3af}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:14px;padding:26px;max-width:460px;width:100%;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal h3{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:#1c1c1e;margin-bottom:10px}
.modal p{font-size:13px;color:#666;margin-bottom:8px;line-height:1.5}
.modal-x{position:absolute;top:12px;right:12px;width:26px;height:26px;background:none;border:none;cursor:pointer;font-size:16px;color:#999;display:flex;align-items:center;justify-content:center;border-radius:50%}
.modal-x:hover{background:#f5f5f5}
.modal input{width:100%;border:1px solid #ddd;border-radius:7px;padding:8px 11px;font-size:13px;color:#1c1c1e;background:#fafafa;outline:none;margin-bottom:8px;font-family:inherit}
.modal input:focus{border-color:#c9884e}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.modal-actions .btn{width:auto;padding:7px 16px}
.link{color:#c9884e;text-decoration:none;font-size:12px}
.link:hover{text-decoration:underline}
.err-icon{width:44px;height:44px;background:#fee2e2;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;margin:0 auto 10px}

/* TOAST / SPINNER */
.toast{position:fixed;bottom:20px;right:20px;background:#1c1c1e;color:#f5f5f0;padding:10px 18px;border-radius:40px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:9px;box-shadow:0 8px 32px rgba(0,0,0,.3);z-index:100;animation:tin .25s ease}
@keyframes tin{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:sp .65s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.spin-dark{border-color:rgba(201,136,78,.25);border-top-color:#c9884e}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:40px;color:#888}
.empty-icon{font-size:56px;margin-bottom:16px;animation:fl 3s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.empty h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#555;margin-bottom:8px}
.empty p{font-size:13px;line-height:1.5;max-width:280px}
.load-overlay{position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:300;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.up-note{font-size:11px;color:#999;margin-top:14px;text-align:center;line-height:1.6}

/* CHAPTER STATUS BAR */
.ch-bar{display:flex;gap:6px;flex-wrap:wrap;padding:8px 12px;background:#1c1c1e}
.ch-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;cursor:pointer;transition:transform .15s}
.ch-dot:hover{transform:scale(1.4)}
.ch-dot.done{background:#86efac}
.ch-dot.writing{background:#c9884e;animation:pulse .8s ease-in-out infinite}
.ch-dot.pending{background:#3a3a3c}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

@media print{
  .sb,.pv-bar,.toast,.overlay,.load-overlay{display:none!important}
  body,html{height:auto;overflow:visible;background:#fff}
  .app{display:block}
  .pv{background:#fff;overflow:visible;height:auto}
  .pv-scroll{padding:0;overflow:visible;display:block;background:#fff;gap:0}
  .pg-wrap{box-shadow:none!important;break-after:page;margin:0!important}
  page{width:6in;min-height:9in;padding:.8in .6in .8in .75in}
  page p{hyphens:manual}
}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useMemo,useCallback}=React;

/* ═══ CONSTANTS ═══ */
const TRIM={
  '6x9'    :{name:'6" × 9" (KDP padrão)',w:6,   h:9,    pw:576, ph:864},
  '5.5x8.5':{name:'5.5" × 8.5"',        w:5.5, h:8.5,  pw:528, ph:816},
  '5x8'    :{name:'5" × 8"',            w:5,   h:8,    pw:480, ph:768},
  'A4'     :{name:'A4 (21×29.7cm)',      w:8.27,h:11.69,pw:794, ph:1123},
};

const TONS=['Informativo e acessível','Inspirador e motivacional','Acadêmico e formal','Narrativo e literário','Prático e direto','Filosófico e reflexivo'];
const GENEROS=['Autoajuda / Desenvolvimento pessoal','Negócios e empreendedorismo','Espiritualidade','Educação','Ficção literária','Memórias / Biografia','Saúde e bem-estar','História e política'];

const DEF={trimSize:'6x9',title:'',author:'',dropCaps:true,addTitlePage:true,addCopyrightPage:true};

/* ═══ IDB ═══ */
const db={
  get:async k=>{try{return window._idbGet?await window._idbGet(k):null}catch{return null}},
  set:async(k,v)=>{try{if(window._idbSet)await window._idbSet(k,v)}catch{}},
};

/* ═══ GEMINI ═══ */
const MODEL='gemini-2.5-flash';
const BASE='https://generativelanguage.googleapis.com/v1beta';

async function gemStream(key,sys,user,onChunk,signal,temp=0.1,maxTok=8192){
  const r=await fetch(`${BASE}/models/${MODEL}:streamGenerateContent?alt=sse&key=${key}`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      system_instruction:{parts:[{text:sys}]},
      contents:[{role:'user',parts:[{text:user}]}],
      generationConfig:{temperature:temp,maxOutputTokens:maxTok},
    }),
    signal,
  });
  if(!r.ok){
    const e=await r.json().catch(()=>({}));
    if(r.status===429)throw new Error('Rate limit (429). Aguarde e tente novamente.');
    throw new Error(e?.error?.message||`HTTP ${r.status}`);
  }
  const rdr=r.body.getReader(),dec=new TextDecoder();
  let buf='';
  while(true){
    if(signal?.aborted){rdr.cancel();return;}
    const{done,value}=await rdr.read();
    if(done)break;
    buf+=dec.decode(value,{stream:true});
    const lines=buf.split('\n');buf=lines.pop();
    for(const ln of lines){
      if(!ln.startsWith('data: '))continue;
      const d=ln.slice(6).trim();
      if(d==='[DONE]')continue;
      try{const j=JSON.parse(d);const t=j.candidates?.[0]?.content?.parts?.[0]?.text||'';if(t)onChunk(t);}catch{}
    }
  }
}

async function gemOnce(key,sys,user,signal,temp=0.2,maxTok=8192){
  let out='';
  await gemStream(key,sys,user,t=>{out+=t;},signal,temp,maxTok);
  return out;
}

/* ═══ TOC FIX ═══ */
function fixTocAndStrip(rawHtml){
  let html=rawHtml.replace(/<span[^>]*class=["']pgnum["'][^>]*>[\s\S]*?<\/span>/gi,'');
  const pageMap={};
  const tempDoc=new DOMParser().parseFromString(`<body>${html}</body>`,'text/html');
  const allPages=tempDoc.querySelectorAll('page');
  allPages.forEach((pg,idx)=>{
    const h1=pg.querySelector('h1');
    if(h1){const key=h1.textContent.trim().toLowerCase().replace(/\s+/g,' ');pageMap[key]=idx+1;}
    const cn=pg.querySelector('.chapter-num');
    if(cn){const key2=cn.textContent.trim().toLowerCase().replace(/\s+/g,' ');if(!pageMap[key2])pageMap[key2]=idx+1;}
  });
  const tocPageRe=/(<page[^>]*>)([\s\S]*?toc-entry[\s\S]*?)(<\/page>)/gi;
  html=html.replace(tocPageRe,(full,open,body,close)=>{
    const newBody=body.replace(/(<div[^>]*class=["'][^"']*toc-entry[^"']*["'][^>]*>)([\s\S]*?)(<\/div>)/gi,(ef,dO,inner,dC)=>{
      const spans=[...inner.matchAll(/<span[^>]*>([\s\S]*?)<\/span>/gi)];
      if(spans.length<1)return ef;
      const tt=spans[0][1].replace(/<[^>]+>/g,'').trim().toLowerCase().replace(/\s+/g,' ');
      let found=null;
      for(const[k,p]of Object.entries(pageMap)){if(k.includes(tt)||tt.includes(k)){found=p;break;}}
      if(found===null)return ef;
      return `${dO}${spans[0][0]}<span class="toc-dots"></span><span>${found}</span>${dC}`;
    });
    return open+newBody+close;
  });
  return html;
}

/* ═══ SYSTEM PROMPT DIAGRAMADOR ═══ */
function buildSys(bookTitle,userStyle){
  return `Você é um diagramador editorial profissional. Converta os blocos de texto em páginas HTML para um livro KDP 6×9".

PROIBIDO:
- NUNCA use style= em nenhum elemento.
- NUNCA altere, resuma ou omita qualquer palavra do texto original.
- NUNCA emita markdown, comentários ou explicações — apenas HTML de <page>.
- NUNCA crie classes fora desta especificação.
- NUNCA feche uma <page class="chapter-page"> sem incluir pelo menos o primeiro parágrafo (dropcap) após o chapter-rule.

ESTRUTURA DE PÁGINA NORMAL:
<page>
<span class="runhead">${bookTitle||'—'}</span>
... conteúdo ...
</page>

ESTRUTURA DE CAPÍTULO — OBRIGATÓRIO incluir parágrafos:
<page class="chapter-page">
<span class="chapter-num">CAPÍTULO N</span>
<h1>Título</h1>
<span class="chapter-rule"></span>
<p class="dropcap">Primeiro parágrafo COMPLETO aqui. Nunca feche a page sem este parágrafo.</p>
<p>Segundo parágrafo...</p>
</page>

CAPACIDADE: page normal = 380 palavras. chapter-page = 320 palavras (padding maior).

ALGORITMO:
- [CAPÍTULO]: feche page atual, abra chapter-page, adicione chapter-num+h1+chapter-rule, wordsUsed=60, CONTINUE adicionando parágrafos dentro desta mesma page.
- [SEÇÃO]: se wordsUsed+palavras+60>capacidade: nova page. Senão: adiciona.
- [PARÁGRAFO]/[PRIMEIRO-PARÁGRAFO]/[CITAÇÃO]/[SEPARADOR]: se wordsUsed+palavras>capacidade: fecha page, abre nova page com runhead, adiciona. Senão: adiciona.

CLASSES DE PARÁGRAFO:
<p class="dropcap"> → APENAS o [PRIMEIRO-PARÁGRAFO] após chapter-rule. Um por capítulo.
<p class="no-indent"> → primeiro § após h2, h3, blockquote, epigraph ou ornament.
<p> → parágrafos normais de continuidade.
<p class="ornament">✦  ✦  ✦</p> → separador de cena.

SEQUÊNCIA OBRIGATÓRIA EM chapter-page:
1. <span class="chapter-num">CAPÍTULO N</span>
2. <h1>Título</h1>
3. <span class="chapter-rule"></span>
4. [se houver] <div class="epigraph">...<cite>— Fonte</cite></div>
5. <p class="dropcap">Primeiro parágrafo COMPLETO</p>  ← NUNCA omitir
6. <p>demais parágrafos até ~320 palavras</p>
7. </page>

SUMÁRIO: use <page class="toc-page">, entradas com class="toc-entry toc-cap" ou "toc-entry toc-part", número de página como "?".
TÍTULO: <page class="title-page">. DIREITOS: <page class="copyright-page">.

${userStyle?`ESTILO ADICIONAL: ${userStyle}\n`:''}
RETORNE APENAS HTML de <page>...</page>. Zero texto fora das tags.`;
}

/* ═══ PARSER DOCX ═══ */
async function parseDocx(file){
  const ab=await file.arrayBuffer();
  const{value}=await mammoth.convertToHtml({arrayBuffer:ab});
  const doc=new DOMParser().parseFromString(value,'text/html');
  const blocks=[];
  let firstAfterH=true,prevWasBlank=false;
  doc.body.childNodes.forEach(node=>{
    if(node.nodeType!==1)return;
    const el=node,raw=(el.textContent||'').trim(),tag=el.tagName.toLowerCase();
    if(!raw){if(tag==='p')prevWasBlank=true;return;}
    let type='paragraph';
    if(tag==='h1')type='heading1';
    else if(tag==='h2')type='heading2';
    else if(tag==='h3')type='heading3';
    else if(tag==='blockquote')type='blockquote';
    if(type==='paragraph'&&raw.length<80){
      const up=raw.toUpperCase();
      if(/^(CAPÍTULO|CHAPTER|PARTE |PART I|PART II|EPÍLOGO|PRÓLOGO|PREFÁCIO|INTRODUÇÃO|CONCLUSÃO|SUMÁRIO|POSFÁCIO|DEDICATÓRIA|AGRADECIMENTOS)/.test(up))type='heading1';
    }
    if(type==='paragraph'&&/^[*\-–—·•✦✧★☆\s]{1,15}$/.test(raw))type='separator';
    if(type==='paragraph'&&raw.length<300&&/^["«"—]/.test(raw)&&prevWasBlank)type='blockquote';
    let isFirst=false;
    if(type.startsWith('heading')){firstAfterH=true;}
    else if(type==='paragraph'){isFirst=firstAfterH;firstAfterH=false;}
    else if(type==='separator'||type==='blockquote'){firstAfterH=false;}
    prevWasBlank=false;
    blocks.push({type,text:raw,isFirst});
  });
  return blocks;
}

/* ═══ DOCX EXPORT ═══ */
async function exportDocx(blocks,config){
  const{Document,Packer,Paragraph,TextRun,HeadingLevel,AlignmentType,Header,Footer,PageNumber}=window.docx;
  const it=n=>Math.round(n*1440);
  const dims=TRIM[config.trimSize];
  const children=blocks.map(b=>{
    let hl;
    if(b.type==='heading1')hl=HeadingLevel.HEADING_1;
    else if(b.type==='heading2')hl=HeadingLevel.HEADING_2;
    else if(b.type==='heading3')hl=HeadingLevel.HEADING_3;
    const runs=[];
    if(!hl&&config.dropCaps&&b.isFirst&&b.text.length>0){
      runs.push(new TextRun({text:b.text[0],size:11*6,bold:true}));
      runs.push(new TextRun({text:b.text.slice(1),size:11*2}));
    }else runs.push(new TextRun({text:b.text,size:11*2}));
    return new Paragraph({
      children:hl?undefined:runs,text:hl?b.text:undefined,heading:hl,
      alignment:b.type.startsWith('heading')?AlignmentType.CENTER:AlignmentType.JUSTIFIED,
      pageBreakBefore:b.type==='heading1',
      indent:(!hl&&!b.isFirst)?{firstLine:it(0.25)}:undefined,
    });
  });
  const doc2=new Document({sections:[{
    properties:{page:{size:{width:it(dims.w),height:it(dims.h)},margin:{top:it(0.8),bottom:it(0.8),left:it(0.75),right:it(0.6)}}},
    headers:config.title?{default:new Header({children:[new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:config.title,italics:true,color:'999999',size:18})]})]})}:undefined,
    footers:{default:new Footer({children:[new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({children:[PageNumber.CURRENT],size:18})]})]})} ,
    children,
  }]});
  saveAs(await Packer.toBlob(doc2),'livro-formatado.docx');
}

async function generateOutline(apiKey,form,signal){
  const sys=`Você é um escritor editorial profissional especializado em livros de não-ficção e ficção para o mercado brasileiro.
Sua tarefa é criar um outline detalhado para um livro completo.
Responda APENAS com JSON válido, sem markdown, sem explicações, sem blocos de código.
Formato exato:
{
  "titulo": "string",
  "subtitulo": "string",
  "autor": "string",
  "descricao": "string (2-3 frases sobre o livro)",
  "paginas_alvo": number,
  "partes": [
    {
      "numero": 1,
      "titulo": "string",
      "capitulos": [
        {
          "numero": 1,
          "titulo": "string",
          "resumo": "string (2-3 frases do que será abordado)",
          "palavras_alvo": number
        }
      ]
    }
  ]
}`;

  const user=`Crie um outline para um livro com as seguintes especificações:
Título desejado: ${form.titulo}
Tema/Assunto: ${form.tema}
Público-alvo: ${form.publico}
Gênero: ${form.genero}
Tom: ${form.tom}
Número de páginas aproximado: ${form.paginas}
Número de capítulos desejado: ${form.capitulos}
Instruções adicionais: ${form.instrucoes||'nenhuma'}

Distribua os capítulos em partes temáticas coerentes.
Cada capítulo deve ter palavras_alvo calculado para que o total chegue a aproximadamente ${form.paginas} páginas (considere 380 palavras por página).
Seja específico nos resumos — cada resumo deve guiar a escrita com conteúdo real, não genérico.`;

  const raw=await gemOnce(apiKey,sys,user,signal,0.7,4096);

}

/* Gera o HTML diagramado de um capítulo completo */
async function generateChapter(apiKey,outline,parte,cap,bookTitle,onChunk,signal){
  const sys=buildSys(bookTitle,'');

  const prevCaps=[];
  for(const pt of outline.partes){
    for(const c of pt.capitulos){
      if(c.numero===cap.numero&&pt.numero===parte.numero)break;
      prevCaps.push(`Capítulo ${c.numero}: ${c.titulo}`);
    }
  }

  const user=`Escreva e diagrame o capítulo abaixo como HTML de <page> pronto para KDP.

LIVRO: "${bookTitle}"
GÊNERO: ${outline.genero||''}
TOM: ${outline.tom||''}
PARTE: ${parte.numero} — ${parte.titulo}
CAPÍTULO: ${cap.numero} — ${cap.titulo}
RESUMO DO CAPÍTULO: ${cap.resumo}
PALAVRAS-ALVO: ${cap.palavras_alvo} palavras de corpo de texto
CAPÍTULOS ANTERIORES (para manter coerência): ${prevCaps.join(', ')||'nenhum — este é o primeiro'}

INSTRUÇÃO CRÍTICA:
1. Escreva o conteúdo COMPLETO do capítulo — não resuma, não abrevia. Atinja ${cap.palavras_alvo} palavras.
2. A primeira <page> DEVE ser <page class="chapter-page"> com chapter-num, h1, chapter-rule e o primeiro parágrafo com dropcap.
3. Continue em <page> normais com <span class="runhead">${bookTitle}</span> até esgotar o conteúdo.
4. Use h2 para seções internas se o conteúdo exigir.
5. O texto deve ser ORIGINAL, rico, específico e no tom indicado. Nada genérico.
6. NÃO inclua o número do capítulo no h1 — ele já vai no chapter-num.

Retorne APENAS o HTML das <page> deste capítulo.`;

  await gemStream(apiKey,sys,user,onChunk,signal,0.75,8192);
}

            <button className="btn btn-gold" style={{marginTop:4}} onClick={()=>onWrite(form)} disabled={!form.titulo.trim()||!form.tema.trim()||!form.publico.trim()}>

            </button>
            <p className="up-note" style={{marginTop:8}}>Necessário: chave gratuita da API Gemini → <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noreferrer" className="link">aistudio.google.com</a></p>
          </div>
        )}

      <button onClick={onApiKey} style={{marginTop:16,background:'none',border:'none',cursor:'pointer',fontSize:12,color:'#aaa',textDecoration:'underline'}}>🔑 Configurar chave API Gemini</button>
    </div>
  );
}

function PdfModal({onClose,onExport,pdfProgress}){

  const pct=pdfProgress?Math.round((pdfProgress.current/pdfProgress.total)*100):0;
  return(
    <div className="overlay" onClick={e=>{if(!busy&&e.target===e.currentTarget)onClose();}}>
      <div className="modal" style={{textAlign:'center'}}>
        {!busy&&<button className="modal-x" onClick={onClose}>✕</button>}
        <div style={{fontSize:38,marginBottom:10}}>{busy?'⏳':'🖨'}</div>
        <h3>{busy?'Gerando PDF…':'Exportar PDF KDP'}</h3>
        {!busy&&<><p style={{marginBottom:16}}>Cada página será capturada como imagem nas dimensões exatas do KDP.</p>
          <button className="btn btn-gold" onClick={onExport}>📸 Capturar e gerar PDF</button></>}
        {busy&&<>
          <p>{pdfProgress.phase}</p>
          <div style={{margin:'14px 0 6px'}}>
            <div className="prog-label"><span>Página {pdfProgress.current} de {pdfProgress.total}</span><span>{pct}%</span></div>

        </>}

/* ═══ APP ═══ */
function App(){
  // MODO: 'home' | 'docx' | 'write'
  const [appMode,setAppMode]=useState('home');

  // ESTADO COMUM
  const [cfg,setCfg]=useState(DEF);
  const [html,setHtml]=useState(null);
  const [loading,setLoading]=useState(false);
  const [aiLoading,setAiLoading]=useState(false);
  const [apiKey,setApiKey]=useState('');
  const [err,setErr]=useState(null);
  const [showApi,setShowApi]=useState(false);
  const [showPdf,setShowPdf]=useState(false);
  const [pdfProgress,setPdfProgress]=useState(null);
  const [aiLabel,setAiLabel]=useState('');
  const abrt=useRef(null);

  // ESTADO DOCX
  const [blocks,setBlocks]=useState(null);
  const [pidx,setPidx]=useState(0);

  // ESTADO WRITE
  const [writeForm,setWriteForm]=useState(null);
  const [outline,setOutline]=useState(null);
  const [showOutline,setShowOutline]=useState(false);
  const [chapterStatus,setChapterStatus]=useState({});  // {capNum: 'pending'|'writing'|'done'}
  const [currentCap,setCurrentCap]=useState(null);
  const [writeStartIdx,setWriteStartIdx]=useState(0);  // próximo capítulo a escrever

  // RESTORE
  useEffect(()=>{
    setApiKey(localStorage.getItem('kdp-key')||'');
    (async()=>{
      const mode=await db.get('kdp-mode');
      const h=await db.get('kdp-html');
      const b=await db.get('kdp-blocks');
      const p=await db.get('kdp-pidx');
      const ol=await db.get('kdp-outline');
      const cs=await db.get('kdp-chstatus');
      const wi=await db.get('kdp-writeIdx');
      const wf=await db.get('kdp-writeform');
      if(mode)setAppMode(mode);
      if(h)setHtml(h);
      if(b)setBlocks(b);
      if(p!=null)setPidx(p);
      if(ol)setOutline(ol);
      if(cs)setChapterStatus(cs);
      if(wi!=null)setWriteStartIdx(wi);
      if(wf)setWriteForm(wf);
      if(h&&location.search.includes('print=1'))setTimeout(()=>window.print(),1200);
    })();
  },[]);

  useEffect(()=>{db.set('kdp-mode',appMode);},[appMode]);
  useEffect(()=>{if(html!=null)db.set('kdp-html',html);},[html]);
  useEffect(()=>{if(blocks)db.set('kdp-blocks',blocks);},[blocks]);
  useEffect(()=>{db.set('kdp-pidx',pidx);},[pidx]);
  useEffect(()=>{if(outline)db.set('kdp-outline',outline);},[outline]);
  useEffect(()=>{db.set('kdp-chstatus',chapterStatus);},[chapterStatus]);
  useEffect(()=>{db.set('kdp-writeIdx',writeStartIdx);},[writeStartIdx]);

  useEffect(()=>{
    const t=TRIM[cfg.trimSize]||TRIM['6x9'];
    const s=document.getElementById('trim-style');
    if(s)s.textContent=`page{width:${t.pw}px;height:${t.ph}px;min-height:${t.ph}px;}`;
  },[cfg.trimSize]);

  const needKey=()=>{if(!apiKey){setShowApi(true);return false;}return true;};

  /* ── DOCX: DIAGRAMA ── */
  const doDiagram=useCallback(async(userStyle='',startIdx=0,baseHtml='')=>{
    if(!blocks||!needKey())return;
    if(abrt.current)abrt.current.abort();
    const ctrl=new AbortController();abrt.current=ctrl;
    try{
      setAiLoading(true);setErr(null);
      let out=baseHtml,pageNum=1;
      if(startIdx===0){setHtml('');out='';setPidx(0);}
      else{
        const m=(baseHtml||'').match(/<page[\s>]/gi);
        pageNum=m?m.length+1:1;
        out=baseHtml||'';
      }
      const CHUNK=40;
      for(let i=startIdx;i<blocks.length;i+=CHUNK){
        if(ctrl.signal.aborted)return;
        setPidx(i);
        setAiLabel(`Diagramando... ${Math.round(((i+1)/blocks.length)*100)}%`);
        const sys=buildSys(cfg.title,userStyle);
        const chunk=blocks.slice(i,i+CHUNK);
        const text=chunk.map(b=>{
          const wc=b.text.trim().split(/\s+/).filter(Boolean).length;
          if(b.type==='heading1')return `[CAPÍTULO | ${wc} palavras]\n${b.text}`;
          if(b.type==='heading2')return `[SEÇÃO | ${wc} palavras]\n${b.text}`;
          if(b.type==='heading3')return `[SUBSEÇÃO | ${wc} palavras]\n${b.text}`;
          if(b.type==='separator')return `[SEPARADOR-DE-CENA | ${wc} palavras]\n${b.text}`;
          if(b.type==='blockquote')return `[CITAÇÃO | ${wc} palavras]\n${b.text}`;
          if(b.isFirst)return `[PRIMEIRO-PARÁGRAFO | ${wc} palavras]\n${b.text}`;
          return `[PARÁGRAFO | ${wc} palavras]\n${b.text}`;
        }).join('\n\n---\n\n');
        let wordsOnCurrentPage=0;
        if(out){
          const lastOpen=out.lastIndexOf('<page');
          if(lastOpen!==-1){
            const lastPageContent=out.slice(lastOpen);
            const plainText=lastPageContent.replace(/<[^>]+>/g,' ');
            wordsOnCurrentPage=plainText.trim().split(/\s+/).filter(Boolean).length;
          }
        }
        let chunkOut='';
        await gemStream(apiKey,sys,
          `Blocos para paginar (NÃO inclua os marcadores [TIPO|N] no HTML):\n\nContexto: página atual=${pageNum}, palavras na página aberta≈${wordsOnCurrentPage}. Continue sem repetir páginas anteriores.\n\n${text}`,
          t=>{chunkOut+=t;out+=t;setHtml(out);},ctrl.signal);
        const m=chunkOut.match(/<page[\s>]/gi);
        pageNum+=m?m.length:0;
        setPidx(Math.min(i+CHUNK,blocks.length));
        if(i+CHUNK<blocks.length)await new Promise(r=>setTimeout(r,1200));
      }
      const fixed=fixTocAndStrip(out);
      setHtml(fixed);
      setPidx(blocks.length);
    }catch(e){
      if(e.name==='AbortError')return;
      setErr(e.message||'Erro na IA.');
    }finally{
      if(abrt.current===ctrl){setAiLoading(false);setAiLabel('');}
    }
  },[blocks,cfg,apiKey,needKey]);

  const handleResume=useCallback(()=>doDiagram('',pidx,html||''),[doDiagram,pidx,html]);

  const handleFix=useCallback(async userStyle=>{
    if(!html||!userStyle.trim()||!needKey())return;
    if(abrt.current)abrt.current.abort();
    const ctrl=new AbortController();abrt.current=ctrl;
    try{
      setAiLoading(true);setErr(null);setAiLabel('Aplicando correção...');
      let out='';
      await gemStream(apiKey,`Você é editor HTML. Aplique APENAS a instrução ao HTML. Retorne o HTML completo modificado, sem markdown.`,
        `HTML:\n\n${html}\n\nInstrução: ${userStyle}`,t=>{out+=t;},ctrl.signal);
      setHtml(out.replace(/```html/g,'').replace(/```/g,'').trim());
    }catch(e){if(e.name!=='AbortError')setErr(e.message||'Erro.');}
    finally{if(abrt.current===ctrl){setAiLoading(false);setAiLabel('');}}
  },[html,apiKey]);

  const handleFile=async f=>{
    try{
      setLoading(true);
      const b=await parseDocx(f);
      setBlocks(b);setHtml(null);setPidx(0);
      setAppMode('docx');
    }catch(e){setErr('Erro ao ler DOCX: '+e.message);}
    finally{setLoading(false);}
  };

  /* ── WRITE: GERAR OUTLINE ── */
  const handleWriteStart=async form=>{
    if(!needKey())return;
    if(abrt.current)abrt.current.abort();
    const ctrl=new AbortController();abrt.current=ctrl;
    try{
      setLoading(true);setErr(null);
      const ol=await generateOutline(apiKey,form,ctrl.signal);
      setWriteForm(form);
      setOutline(ol);
      db.set('kdp-writeform',form);
      // Atualiza cfg com título/autor do outline
      setCfg(c=>({...c,title:ol.titulo||form.titulo,author:ol.autor||form.autor}));
      setShowOutline(true);
    }catch(e){
      if(e.name!=='AbortError')setErr('Erro ao gerar outline: '+e.message);
    }finally{setLoading(false);}
  };

  /* ── WRITE: ESCREVER TODOS OS CAPÍTULOS ── */
  const doWriteBook=useCallback(async(startCapIdx=0)=>{
    if(!outline||!needKey())return;
    if(abrt.current)abrt.current.abort();
    const ctrl=new AbortController();abrt.current=ctrl;

    // Flatten capítulos com referência à parte
    const allCaps=[];
    for(const pt of outline.partes){
      for(const cap of pt.capitulos){
        allCaps.push({parte:pt,cap});
      }
    }

    const bookTitle=outline.titulo||cfg.title||'Livro';

    try{
      setAiLoading(true);setErr(null);
      setAppMode('write');

      // Gera páginas especiais no início (apenas se startCapIdx===0)
      let out=html||'';
      if(startCapIdx===0){
        out='';
        setHtml('');
        setChapterStatus({});

        // Página de título
        if(cfg.addTitlePage){
          out+=`<page class="title-page">
<h1>${bookTitle}</h1>
${outline.subtitulo?`<div class="subtitle">${outline.subtitulo}</div>`:''}
<div class="author">${outline.autor||cfg.author||''}</div>
</page>`;
          setHtml(out);
        }

        // Página de sumário (será atualizada ao final)
        out+=`<page class="toc-page"><h2>Sumário</h2>`;
        for(const pt of outline.partes){
          out+=`<div class="toc-entry toc-part"><span>PARTE ${pt.numero} — ${pt.titulo.toUpperCase()}</span><span class="toc-dots"></span><span>?</span></div>`;
          for(const cap of pt.capitulos){
            out+=`<div class="toc-entry toc-cap"><span>Capítulo ${cap.numero} — ${cap.titulo}</span><span class="toc-dots"></span><span>?</span></div>`;
          }
        }
        out+=`</page>`;
        setHtml(out);
      }

      // Escreve cada capítulo
      for(let i=startCapIdx;i<allCaps.length;i++){
        if(ctrl.signal.aborted)return;
        const {parte,cap}=allCaps[i];
        setCurrentCap(cap.numero);
        setWriteStartIdx(i+1);
        setChapterStatus(prev=>({...prev,[cap.numero]:'writing'}));
        setAiLabel(`Escrevendo Cap. ${cap.numero}/${allCaps.length}: ${cap.titulo}`);

        let capHtml='';
        await generateChapter(apiKey,outline,parte,cap,bookTitle,
          t=>{capHtml+=t;out+=t;setHtml(out);},
          ctrl.signal
        );

        setChapterStatus(prev=>({...prev,[cap.numero]:'done'}));

        // Delay entre capítulos para evitar rate limit
        if(i<allCaps.length-1)await new Promise(r=>setTimeout(r,1500));
      }

      // Página de direitos ao final
      if(cfg.addCopyrightPage&&startCapIdx===0){
        const year=new Date().getFullYear();
        out+=`<page class="copyright-page">
<p class="no-indent">© ${year} ${outline.autor||cfg.author||''}</p>
<p class="no-indent">Todos os direitos reservados.</p>
<p class="no-indent">Proibida a reprodução total ou parcial sem autorização.</p>
</page>`;
        setHtml(out);
      }

      // Fix TOC com números reais
      const fixed=fixTocAndStrip(out);
      setHtml(fixed);
      setCurrentCap(null);

    }catch(e){
      if(e.name==='AbortError')return;
      setErr(e.message||'Erro na geração.');
    }finally{
      if(abrt.current===ctrl){setAiLoading(false);setAiLabel('');setCurrentCap(null);}
    }
  },[outline,cfg,apiKey,html,needKey]);

  /* Regenera um capítulo específico */
  const handleRegenChapter=useCallback(async capNum=>{
    if(!outline||!needKey())return;
    if(abrt.current)abrt.current.abort();
    const ctrl=new AbortController();abrt.current=ctrl;

    let parte=null,cap=null;
    for(const pt of outline.partes){
      for(const c of pt.capitulos){
        if(c.numero===capNum){parte=pt;cap=c;break;}
      }
    }
    if(!cap)return;

    const bookTitle=outline.titulo||cfg.title;

    // Remove o HTML do capítulo antigo do html total
    // Estratégia: localiza a chapter-page com este número e remove até a próxima chapter-page ou fim
    let curHtml=html||'';
    const capNumStr=String(capNum);
    // Regex para encontrar a page do capítulo: procura chapter-num com o número exato
    const capRegex=new RegExp(
      `<page[^>]*class="chapter-page"[^>]*>[\\s\\S]*?<span[^>]*class="chapter-num"[^>]*>[^<]*${capNumStr}[^<]*<\\/span>[\\s\\S]*?(?=<page[\\s>]|$)`,
      'i'
    );
    curHtml=curHtml.replace(capRegex,'');

    try{
      setAiLoading(true);setErr(null);
      setChapterStatus(prev=>({...prev,[capNum]:'writing'}));
      setCurrentCap(capNum);
      setAiLabel(`Regenerando Cap. ${capNum}: ${cap.titulo}`);

      let newCapHtml='';
      await generateChapter(apiKey,outline,parte,cap,bookTitle,
        t=>{newCapHtml+=t;},ctrl.signal
      );

      // Reinsere o capítulo regenerado no lugar correto
      // Localiza onde inserir: antes da próxima chapter-page do capítulo seguinte
      const nextCapNum=capNum+1;
      const nextCapRegex=new RegExp(
        `(<page[^>]*class="chapter-page"[^>]*>[\\s\\S]*?<span[^>]*class="chapter-num"[^>]*>[^<]*${nextCapNum}[^<]*<\\/span>)`,
        'i'
      );
      if(nextCapRegex.test(curHtml)){
        curHtml=curHtml.replace(nextCapRegex,newCapHtml+'$1');
      }else{
        curHtml+=newCapHtml;
      }

      const fixed=fixTocAndStrip(curHtml);
      setHtml(fixed);
      setChapterStatus(prev=>({...prev,[capNum]:'done'}));
    }catch(e){
      if(e.name!=='AbortError')setErr(e.message||'Erro ao regenerar.');
    }finally{
      if(abrt.current===ctrl){setAiLoading(false);setAiLabel('');setCurrentCap(null);}
    }
  },[outline,cfg,apiKey,html,needKey]);

  /* ── EXPORT PDF ── */
  const exportPdfScreenshot=useCallback(async()=>{
    const wrappers=document.querySelectorAll('.pg-wrap');
    if(!wrappers.length){setErr('Nenhuma página para exportar.');return;}
    const{jsPDF}=window.jspdf;
    const trimDims=TRIM[cfg.trimSize]||TRIM['6x9'];
    const PW=trimDims.w*72,PH=trimDims.h*72;
    const doc=new jsPDF({orientation:'portrait',unit:'pt',format:[PW,PH],compress:true});
    const total=wrappers.length;
    try{
      for(let i=0;i<total;i++){
        setPdfProgress({current:i+1,total,phase:`Capturando página ${i+1} de ${total}…`});
        await new Promise(r=>setTimeout(r,30));
        const pageEl=wrappers[i].querySelector('page')||wrappers[i];
        const{pw:PX_W,ph:PX_H}=trimDims;
        const canvas=await html2canvas(pageEl,{
          scale:3,useCORS:true,allowTaint:true,backgroundColor:'#ffffff',
          width:PX_W,height:PX_H,windowWidth:PX_W,windowHeight:PX_H,logging:false,
          onclone:(clonedDoc)=>{
            [...document.querySelectorAll('link[rel=stylesheet],style')].forEach(s=>{
              const tag=s.tagName.toLowerCase();
              if(tag==='link'){const c=clonedDoc.createElement('link');c.rel='stylesheet';c.href=s.href;clonedDoc.head.appendChild(c);}
              else{const c=clonedDoc.createElement('style');c.textContent=s.textContent;clonedDoc.head.appendChild(c);}
            });
          },
        });
        const imgData=canvas.toDataURL('image/jpeg',0.97);
        if(i>0)doc.addPage([PW,PH],'portrait');
        doc.addImage(imgData,'JPEG',0,0,PW,PH,undefined,'FAST');
      }
      setPdfProgress({current:total,total,phase:'Salvando PDF…'});
      await new Promise(r=>setTimeout(r,80));
      const title=(cfg.title||'livro').replace(/[^a-z0-9áéíóúãõâêîôûàèçñ\s]/gi,'').trim()||'livro';
      doc.save(`${title}-kdp.pdf`);
    }finally{setPdfProgress(null);setShowPdf(false);}
  },[cfg]);

  const handleExportJpgs=useCallback(async()=>{
    const wrappers=document.querySelectorAll('.pg-wrap');
    if(!wrappers.length){setErr('Nenhuma página para exportar.');return;}
    setLoading(true);
    try{
      const{pw:PX_W,ph:PX_H}=TRIM[cfg.trimSize]||TRIM['6x9'];
      const title=(cfg.title||'pagina').replace(/[^a-z0-9]/gi,'-');
      for(let i=0;i<wrappers.length;i++){
        const pageEl=wrappers[i].querySelector('page')||wrappers[i];
        const canvas=await html2canvas(pageEl,{
          scale:3,useCORS:true,allowTaint:true,backgroundColor:'#ffffff',
          width:PX_W,height:PX_H,windowWidth:PX_W,windowHeight:PX_H,logging:false,
          onclone:(clonedDoc)=>{
            [...document.querySelectorAll('link[rel=stylesheet],style')].forEach(s=>{
              const tag=s.tagName.toLowerCase();
              if(tag==='link'){const c=clonedDoc.createElement('link');c.rel='stylesheet';c.href=s.href;clonedDoc.head.appendChild(c);}
              else{const c=clonedDoc.createElement('style');c.textContent=s.textContent;clonedDoc.head.appendChild(c);}
            });
          },
        });
        canvas.toBlob(blob=>{saveAs(blob,`${title}-pag${String(i+1).padStart(3,'0')}.jpg`);},'image/jpeg',0.97);
        await new Promise(r=>setTimeout(r,40));
      }
    }finally{setLoading(false);}
  },[cfg]);

  const handleDocxExport=async()=>{
    if(!blocks)return;
    try{setLoading(true);await exportDocx(blocks,cfg);}
    catch(e){setErr('Erro DOCX: '+e.message);}
    finally{setLoading(false);}
  };

  const reset=()=>{
    setAppMode('home');setBlocks(null);setHtml(null);setPidx(0);
    setOutline(null);setChapterStatus({});setWriteStartIdx(0);setWriteForm(null);setCurrentCap(null);
    db.set('kdp-mode','home');db.set('kdp-blocks',null);db.set('kdp-html',null);
    db.set('kdp-outline',null);db.set('kdp-chstatus',{});db.set('kdp-writeIdx',0);
  };

  /* ── RENDER ── */

  if(appMode==='home') return(
    <>
      <HomeScreen
        onDocx={handleFile}
        onWrite={handleWriteStart}
        onApiKey={()=>setShowApi(true)}
        loading={loading}/>
      {showApi&&<ApiModal onClose={()=>setShowApi(false)} apiKey={apiKey} setApiKey={setApiKey}/>}
      {err&&<ErrModal msg={err} onClose={()=>setErr(null)}/>}
      {showOutline&&outline&&<OutlineModal outline={outline} onClose={()=>setShowOutline(false)} onConfirm={()=>{setShowOutline(false);doWriteBook(0);}}/>}
      {loading&&<div className="load-overlay"><div style={{textAlign:'center'}}><div className="spin spin-dark" style={{width:36,height:36,borderWidth:3,margin:'0 auto 12px'}}/><p style={{fontFamily:"'Playfair Display',serif",color:'#c9884e',fontSize:14,marginTop:4}}>Gerando outline...</p></div></div>}
    </>
  );

  if(appMode==='docx') return(
    <div className="app">
      <SidebarDocx cfg={cfg} setCfg={setCfg} blocks={blocks} processedIdx={pidx}
        html={html} aiLoading={aiLoading}
        onDiagram={doDiagram} onResume={handleResume} onApplyFix={handleFix}
        onPdf={()=>setShowPdf(true)} onDocx={handleDocxExport} onExportJpgs={handleExportJpgs}
        onApiKey={()=>setShowApi(true)} onNewFile={reset}/>
      <Preview html={html} aiLoading={aiLoading} label={aiLabel}/>
      {aiLoading&&<div className="toast"><div className="spin"/>{aiLabel||'Processando...'}</div>}
      {showApi&&<ApiModal onClose={()=>setShowApi(false)} apiKey={apiKey} setApiKey={setApiKey}/>}
      {showPdf&&<PdfModal onClose={()=>{if(!pdfProgress)setShowPdf(false);}} onExport={exportPdfScreenshot} pdfProgress={pdfProgress}/>}
      {err&&<ErrModal msg={err} onClose={()=>setErr(null)}/>}
      {loading&&<div className="load-overlay"><div className="spin spin-dark" style={{width:36,height:36,borderWidth:3}}/></div>}
    </div>
  );

  if(appMode==='write') return(
    <div className="app">
      <SidebarWrite cfg={cfg} setCfg={setCfg} outline={outline}
        chapterStatus={chapterStatus} aiLoading={aiLoading} currentCap={currentCap}
        onPdf={()=>setShowPdf(true)} onExportJpgs={handleExportJpgs}
        onApiKey={()=>setShowApi(true)} onNewFile={reset}
        html={html} onRegenChapter={handleRegenChapter}/>
      <Preview html={html} aiLoading={aiLoading} label={aiLabel}/>
      {aiLoading&&<div className="toast"><div className="spin"/>{aiLabel||'Escrevendo...'}</div>}
      {showApi&&<ApiModal onClose={()=>setShowApi(false)} apiKey={apiKey} setApiKey={setApiKey}/>}
      {showPdf&&<PdfModal onClose={()=>{if(!pdfProgress)setShowPdf(false);}} onExport={exportPdfScreenshot} pdfProgress={pdfProgress}/>}
      {err&&<ErrModal msg={err} onClose={()=>setErr(null)}/>}
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
