<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useEffect,useMemo,useCallback}=React;

const TRIM={
  '6x9'    :{name:'6" × 9" (KDP padrão)',  w:6,   h:9,    pw:576, ph:864,  cap:370},
  '5.5x8.5':{name:'5.5" × 8.5"',          w:5.5, h:8.5,  pw:528, ph:816,  cap:340},
  '5x8'    :{name:'5" × 8"',              w:5,   h:8,    pw:480, ph:768,  cap:310},
  'A4'     :{name:'A4 (21×29.7cm)',        w:8.27,h:11.69,pw:794, ph:1123, cap:520},
};

const DEF={trimSize:'6x9',fontFamily:'EB Garamond',title:'',author:'',dropCaps:true,addTitlePage:false,addCopyrightPage:false};

const db={
  get:async k=>{try{return window._idbGet?await window._idbGet(k):null}catch{return null}},
  set:async(k,v)=>{try{if(window._idbSet)await window._idbSet(k,v)}catch{}},
};

/* ════════════════════════════════════════════════════
   GEMINI STREAM — com auto-retry em rate-limit (429)
════════════════════════════════════════════════════ */
const MODEL='gemini-2.5-flash';
const BASE='https://generativelanguage.googleapis.com/v1beta';

async function gemStream(key,sys,user,onChunk,signal,attempt=0){
  const r=await fetch(`${BASE}/models/${MODEL}:streamGenerateContent?alt=sse&key=${key}`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      system_instruction:{parts:[{text:sys}]},
      contents:[{role:'user',parts:[{text:user}]}],
      generationConfig:{temperature:0.05,maxOutputTokens:8192},
    }),
    signal,
  });
  if(!r.ok){
    const e=await r.json().catch(()=>({}));
    if(r.status===429&&attempt<3){
      // backoff exponencial: 15s, 30s, 60s
      await new Promise(res=>setTimeout(res,15000*(attempt+1)));
      return gemStream(key,sys,user,onChunk,signal,attempt+1);
    }
    throw new Error(e?.error?.message||`HTTP ${r.status}`);
  }
  const rdr=r.body.getReader(),dec=new TextDecoder();
  let buf='';
  while(true){
    if(signal?.aborted){rdr.cancel();return;}
    const{done,value}=await rdr.read();
    if(done)break;
    buf+=dec.decode(value,{stream:true});
    const lines=buf.split('\n');buf=lines.pop();
    for(const ln of lines){
      if(!ln.startsWith('data: '))continue;
      const d=ln.slice(6).trim();
      if(d==='[DONE]')continue;
      try{const j=JSON.parse(d);const t=j.candidates?.[0]?.content?.parts?.[0]?.text||'';if(t)onChunk(t);}catch{}
    }
  }
}

/* ════════════════════════════════════════════════════
   PRÉ-PAGINADOR LOCAL — o cérebro do sistema
   
   IDEIA GENIAL: em vez de mandar 20 blocos para a IA
   e pedir que ela calcule páginas, o JS já monta as
   "páginas candidatas" agrupando blocos por word-count.
   A IA recebe páginas quase prontas e só precisa:
   1. Converter os blocos em HTML correto
   2. Confirmar ou ajustar quebras de borda
   
   Resultado: ~60% menos tokens, paginação muito mais
   consistente, e a IA nunca "esquece" a conta.
════════════════════════════════════════════════════ */
function prePaginate(blocks, cap=370){
  // cap = capacidade em palavras por página (vem do TRIM)
  const CHAPTER_OVERHEAD=60; // padding-top extra da chapter-page
  const H2_GUARD=60;         // palavras mínimas livres para h2 não ser órfão
  const pages=[];
  let cur=[];
  let used=0;

  const flush=()=>{if(cur.length){pages.push([...cur]);cur=[];used=0;}};

  for(let i=0;i<blocks.length;i++){
    const b=blocks[i];
    const wc=b.wc;

    if(b.type==='heading1'){
      flush();
      // capítulo sempre começa página nova
      cur.push(b);used=CHAPTER_OVERHEAD;
      continue;
    }

    if(b.type==='heading2'||b.type==='heading3'){
      // guarda espaço para h2 + pelo menos 2 parágrafos (~60 palavras)
      if(used+wc+H2_GUARD>cap){flush();}
      cur.push(b);used+=wc;
      continue;
    }

    // bloco normal — verifica se cabe
    if(used+wc>cap){flush();}
    cur.push(b);used+=wc;
  }
  flush();
  return pages;
}

/* ════════════════════════════════════════════════════
   SYSTEM PROMPT — ultra-compacto
   
   PRINCÍPIO: cada byte do prompt custa tokens.
   A versão anterior tinha ~900 palavras de instruções.
   Esta tem ~280 — sem perder nenhuma regra essencial.
   Como? Removemos redundâncias, colapsamos exemplos
   em tabelas, e tudo que pode ser inferido do HTML
   de exemplo não é repetido em prosa.
════════════════════════════════════════════════════ */
function buildSys(title,userStyle){
  const rh=title||'—';
  return `Diagramador editorial KDP. Converta os grupos de blocos abaixo em HTML de <page>.

PROIBIDO: style= | markdown | comentários | classes não listadas | alterar/omitir texto.

ESQUELETO DE PÁGINA NORMAL:
<page><span class="runhead">${rh}</span>…conteúdo…</page>

CAPÍTULO (heading1):
<page class="chapter-page">
<span class="chapter-num">CAPÍTULO N</span>
<h1>Título</h1><span class="chapter-rule"></span>
[<div class="epigraph">Frase<cite>— Autor</cite></div>  ← só se houver]
<p class="dropcap">Primeiro §…</p>
<p>Demais §…</p></page>

TAGS PERMITIDAS — use exatamente:
p           → parágrafo normal (recuo via CSS)
p.no-indent → 1º § após h2/h3/blockquote/epigraph/ornament
p.dropcap   → SOMENTE o 1º § de cada capítulo (1 por página)
p.ornament  → separador de cena: <p class="ornament">✦  ✦  ✦</p>
p.center    → texto centralizado
h2          → seção; próximo § = no-indent
h3          → subseção; próximo § = no-indent
blockquote  → citação: <blockquote>Texto<cite>— Autor</cite></blockquote>
epigraph    → <div class="epigraph">Texto<cite>— Fonte</cite></div>

PAGINAÇÃO: os blocos já chegam agrupados por página (separados por ═══PAGE═══).
Cada grupo = uma <page>. Respeite os grupos — NÃO junte nem divida.
Se um grupo começa com heading1, é chapter-page. Senão, page normal.

SUMÁRIO: <page class="toc-page"><span class="runhead">Sumário</span><h2>Sumário</h2>
<div class="toc-entry toc-part"><span>PARTE I</span><span class="toc-dots"></span><span>?</span></div>
<div class="toc-entry toc-cap"><span>Cap 1 — Título</span><span class="toc-dots"></span><span>?</span></div></page>
(use "?" — números reais são inseridos automaticamente após)

PÁGINAS ESPECIAIS: title-page | copyright-page (sem runhead, todo p = no-indent)

NÃO inclua pgnum — Amazon KDP numera automaticamente.
${userStyle?`\nESTILO EXTRA: ${userStyle}`:''}
RETORNE apenas HTML <page>…</page> em sequência. Zero texto fora das tags.`;
}

/* ════════════════════════════════════════════════════
   TOC AUTO-NUMBERING + STRIP pgnum
════════════════════════════════════════════════════ */
function fixTocAndStrip(rawHtml){
  let html=rawHtml.replace(/<span[^>]*class=["']pgnum["'][^>]*>[\s\S]*?<\/span>/gi,'');
  const tmp=new DOMParser().parseFromString(`<body>${html}</body>`,'text/html');
  const pageMap={};
  tmp.querySelectorAll('page').forEach((pg,idx)=>{
    const h1=pg.querySelector('h1');
    if(h1)pageMap[h1.textContent.trim().toLowerCase().replace(/\s+/g,' ')]=idx+1;
    const cn=pg.querySelector('.chapter-num');
    if(cn){const k=cn.textContent.trim().toLowerCase().replace(/\s+/g,' ');if(!pageMap[k])pageMap[k]=idx+1;}
  });
  html=html.replace(/(<page[^>]*>)([\s\S]*?toc-entry[\s\S]*?)(<\/page>)/gi,(_,o,body,c)=>{
    const nb=body.replace(/(<div[^>]*toc-entry[^>]*>)([\s\S]*?)(<\/div>)/gi,(_2,dO,inner,dC)=>{
      const spans=[...inner.matchAll(/<span[^>]*>([\s\S]*?)<\/span>/gi)];
      if(!spans.length)return _2;
      const title=spans[0][1].replace(/<[^>]+>/g,'').trim().toLowerCase().replace(/\s+/g,' ');
      let found=null;
      for(const[k,n]of Object.entries(pageMap)){if(k.includes(title)||title.includes(k)){found=n;break;}}
      if(!found)return _2;
      return `${dO}${spans[0][0]}<span class="toc-dots"></span><span>${found}</span>${dC}`;
    });
    return o+nb+c;
  });
  return html;
}

/* ════════════════════════════════════════════════════
   DOCX PARSER — detecta epígrafes, listas, diálogos
════════════════════════════════════════════════════ */
async function parseDocx(file){
  const ab=await file.arrayBuffer();
  const{value}=await mammoth.convertToHtml({arrayBuffer:ab},{
    styleMap:["p[style-name='Quote'] => blockquote:fresh","p[style-name='Epigraph'] => p.epigraph:fresh"]
  });
  const doc=new DOMParser().parseFromString(value,'text/html');
  const blocks=[];
  let firstAfterH=true;
  let prevWasBlank=false;
  let prevWasChapter=false;

  doc.body.childNodes.forEach(node=>{
    if(node.nodeType!==1)return;
    const el=node;
    const raw=(el.textContent||'').trim();
    const tag=el.tagName.toLowerCase();

    if(!raw){if(tag==='p')prevWasBlank=true;return;}

    let type='paragraph';
    if(tag==='h1')type='heading1';
    else if(tag==='h2')type='heading2';
    else if(tag==='h3')type='heading3';
    else if(tag==='blockquote')type='blockquote';
    else if(tag==='ul'||tag==='ol')type='list';

    // Auto-promoção para heading1
    if(type==='paragraph'&&raw.length<90){
      if(/^(CAPÍTULO|CHAPTER|PARTE\s|PART\s[IVX\d]|EPÍLOGO|PRÓLOGO|PREFÁCIO|INTRODUÇÃO|CONCLUSÃO|SUMÁRIO|POSFÁCIO|DEDICATÓRIA|AGRADECIMENTOS)/i.test(raw))
        type='heading1';
    }

    // Separador de cena
    if(type==='paragraph'&&/^[*\-–—·•✦✧★☆\s]{1,15}$/.test(raw))
      type='separator';

    // Epígrafe: texto curto com aspas/travessão logo após capítulo
    if(type==='paragraph'&&prevWasChapter&&raw.length<250&&/["«"—]/.test(raw))
      type='epigraph';

    // Citação inline (aspas/travessão no início, linha em branco antes, < 300 chars)
    if(type==='paragraph'&&raw.length<300&&/^["«"—]/.test(raw)&&prevWasBlank&&!prevWasChapter)
      type='blockquote';

    const wc=raw.split(/\s+/).filter(Boolean).length;
    let isFirst=false;
    if(type==='heading1'){firstAfterH=true;prevWasChapter=true;}
    else{
      if(type==='paragraph'){isFirst=firstAfterH;firstAfterH=false;}
      prevWasChapter=false;
    }

    prevWasBlank=false;
    blocks.push({type,text:raw,isFirst,wc});
  });
  return blocks;
}

/* ════════════════════════════════════════════════════
   DOCX EXPORT (estrutural — sem IA)
════════════════════════════════════════════════════ */
async function exportDocx(blocks,config){
  const{Document,Packer,Paragraph,TextRun,HeadingLevel,AlignmentType,Header,Footer,PageNumber}=window.docx;
  const it=n=>Math.round(n*1440);
  const dims=TRIM[config.trimSize];
  const children=blocks.map(b=>{
    let hl;
    if(b.type==='heading1')hl=HeadingLevel.HEADING_1;
    else if(b.type==='heading2')hl=HeadingLevel.HEADING_2;
    else if(b.type==='heading3')hl=HeadingLevel.HEADING_3;
    const runs=[];
    if(!hl&&config.dropCaps&&b.isFirst&&b.text.length>0){
      runs.push(new TextRun({text:b.text[0],size:66,bold:true}));
      runs.push(new TextRun({text:b.text.slice(1),size:22}));
    }else runs.push(new TextRun({text:b.text,size:22}));
    return new Paragraph({
      children:hl?undefined:runs,text:hl?b.text:undefined,heading:hl,
      alignment:b.type.startsWith('heading')?AlignmentType.CENTER:AlignmentType.JUSTIFIED,
      pageBreakBefore:b.type==='heading1',
      indent:(!hl&&!b.isFirst)?{firstLine:it(0.25)}:undefined,
    });
  });
  const doc2=new Document({sections:[{
    properties:{page:{size:{width:it(dims.w),height:it(dims.h)},margin:{top:it(0.8),bottom:it(0.8),left:it(0.75),right:it(0.6)}}},
    headers:config.title?{default:new Header({children:[new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:config.title,italics:true,color:'999999',size:18})]})]})}:undefined,
    footers:{default:new Footer({children:[new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({children:[PageNumber.CURRENT],size:18})]})]})},
    children,
  }]});
  saveAs(await Packer.toBlob(doc2),'livro-formatado.docx');
}

/* ════════════════════════════════════════════════════
   APP
════════════════════════════════════════════════════ */
function App(){
  const[cfg,setCfg]=useState(DEF);
  const[blocks,setBlocks]=useState(null);
  const[html,setHtml]=useState(null);
  const[loading,setLoading]=useState(false);
  const[aiLoading,setAiLoading]=useState(false);
  const[pidx,setPidx]=useState(0);
  const[apiKey,setApiKey]=useState('');
  const[err,setErr]=useState(null);
  const[showApi,setShowApi]=useState(false);
  const[showPdf,setShowPdf]=useState(false);
  const[pdfProgress,setPdfProgress]=useState(null);
  const abrt=useRef(null);

  useEffect(()=>{
    setApiKey(localStorage.getItem('kdp-key')||'');
    (async()=>{
      const b=await db.get('kdp-blocks');if(b)setBlocks(b);
      const h=await db.get('kdp-html');if(h){setHtml(h);if(location.search.includes('print=1'))setTimeout(()=>window.print(),1200);}
      const p=await db.get('kdp-pidx');if(p!=null)setPidx(p);
    })();
  },[]);

  useEffect(()=>{if(blocks)db.set('kdp-blocks',blocks);},[blocks]);
  useEffect(()=>{if(html!=null)db.set('kdp-html',html);},[html]);
  useEffect(()=>{db.set('kdp-pidx',pidx);},[pidx]);

  useEffect(()=>{
    const t=TRIM[cfg.trimSize]||TRIM['6x9'];
    const s=document.getElementById('trim-style');
    if(s)s.textContent=`page{width:${t.pw}px;height:${t.ph}px;min-height:${t.ph}px;}`;
  },[cfg.trimSize]);

  const needKey=useCallback(()=>{if(!apiKey){setShowApi(true);return false;}return true;},[apiKey]);

  /* ══════════════════════════════════════════
     DIAGRAMA — núcleo redesenhado
     
     FLUXO:
     1. prePaginate() agrupa blocos em páginas localmente
     2. Cada grupo vira um chunk de texto separado por ═══PAGE═══
     3. A IA recebe N páginas por chamada (PAGES_PER_CALL)
     4. Ela só converte — não precisa calcular quebras
     5. Saída limpa, strip de artefatos, fixTocAndStrip
  ══════════════════════════════════════════ */
  const doDiagram=useCallback(async(userStyle='',startIdx=0,baseHtml='')=>{
    if(!blocks||!needKey())return;
    if(abrt.current)abrt.current.abort();
    const ctrl=new AbortController();abrt.current=ctrl;

    try{
      setAiLoading(true);setErr(null);
      const cap=(TRIM[cfg.trimSize]||TRIM['6x9']).cap;

      // Adiciona páginas especiais ao início, se pedidas
      let allBlocks=[...blocks];
      if(cfg.addTitlePage)
        allBlocks=[{type:'heading1',text:`${cfg.title||'Título'}__TITLE_PAGE__`,wc:0,isFirst:false},...allBlocks];
      if(cfg.addCopyrightPage)
        allBlocks.splice(cfg.addTitlePage?1:0,0,{type:'heading1',text:`${cfg.author||''}__COPYRIGHT_PAGE__`,wc:0,isFirst:false});

      // Pré-pagina localmente — JS faz o trabalho pesado
      const pages=prePaginate(allBlocks,cap);

      let out=startIdx===0?'':baseHtml||html||'';
      if(startIdx===0){setHtml('');setPidx(0);}

      // Quantas páginas por chamada de API
      const PAGES_PER_CALL=6;
      const sys=buildSys(cfg.title,userStyle);

      // startIdx agora representa índice de página (não de bloco)
      for(let pi=startIdx;pi<pages.length;pi+=PAGES_PER_CALL){
        if(ctrl.signal.aborted)return;
        // Atualiza progresso em termos de blocos processados
        const blocksProcessed=pages.slice(0,pi).reduce((s,pg)=>s+pg.length,0);
        setPidx(blocksProcessed);

        const batch=pages.slice(pi,pi+PAGES_PER_CALL);
        const userMsg=batch.map((pg,idx)=>{
          const lines=pg.map(b=>{
            const tag=
              b.type==='heading1'   ?'[CAPÍTULO]':
              b.type==='heading2'   ?'[SEÇÃO]':
              b.type==='heading3'   ?'[SUBSEÇÃO]':
              b.type==='separator'  ?'[SEPARADOR]':
              b.type==='blockquote' ?'[CITAÇÃO]':
              b.type==='epigraph'   ?'[EPÍGRAFE]':
              b.type==='list'       ?'[LISTA]':
              b.isFirst             ?'[1º-PARÁGRAFO]':'[§]';
            return `${tag} ${b.text}`;
          }).join('\n');
          return `═══PAGE ${pi+idx+1}═══\n${lines}`;
        }).join('\n\n');

        let chunkOut='';
        await gemStream(apiKey,sys,userMsg,t=>{chunkOut+=t;out+=t;setHtml(out);},ctrl.signal);

        // Limpeza de artefatos comuns na saída da IA
        const clean=chunkOut
          .replace(/```html[\s\S]*?```/g,m=>m.replace(/```html\n?/,'').replace(/\n?```/,''))
          .replace(/```/g,'')
          .replace(/<!--[\s\S]*?-->/g,'');
        if(clean!==chunkOut){out=out.slice(0,out.length-chunkOut.length)+clean;setHtml(out);}

        if(pi+PAGES_PER_CALL<pages.length)await new Promise(r=>setTimeout(r,800));
      }

      const fixed=fixTocAndStrip(out);
      setHtml(fixed);
      setPidx(blocks.length);
    }catch(e){
      if(e.name==='AbortError')return;
      setErr(e.message||'Erro na IA.');
    }finally{
      if(abrt.current===ctrl)setAiLoading(false);
    }
  },[blocks,cfg,apiKey,html,needKey]);

  const handleResume=useCallback(()=>{
    if(!blocks)return;
    // Resume conta por blocos processados
    doDiagram('',pidx,html||'');
  },[doDiagram,pidx,html,blocks]);

  /* ══════════════════════════════════════════
     FIX CIRÚRGICO — opera só na página clicada
     se nenhum número fornecido, manda o HTML todo
     mas com prompt muito mais curto
  ══════════════════════════════════════════ */
  const handleFix=useCallback(async userStyle=>{
    if(!html||!userStyle.trim()||!needKey())return;
    if(abrt.current)abrt.current.abort();
    const ctrl=new AbortController();abrt.current=ctrl;
    try{
      setAiLoading(true);setErr(null);
      const sys=`Editor HTML de livro KDP. Aplique SOMENTE a instrução ao HTML. Retorne HTML completo. Sem markdown. Não altere texto original.`;
      let out='';
      await gemStream(apiKey,sys,`HTML:\n${html}\n\nInstrução: ${userStyle}`,t=>{out+=t;},ctrl.signal);
      const clean=out.replace(/```html\n?/g,'').replace(/```/g,'').trim();
      setHtml(clean);
    }catch(e){if(e.name!=='AbortError')setErr(e.message||'Erro.');}
    finally{if(abrt.current===ctrl)setAiLoading(false);}
  },[html,apiKey,needKey]);

  const handleFile=async f=>{
    try{setLoading(true);const b=await parseDocx(f);setBlocks(b);setHtml(null);setPidx(0);}
    catch(e){setErr('Erro ao ler DOCX: '+e.message);}
    finally{setLoading(false);}
  };

  /* ══ PDF EXPORT ══ */
  const exportPdfScreenshot=useCallback(async()=>{
    const wrappers=document.querySelectorAll('.pg-wrap');
    if(!wrappers.length){setErr('Nenhuma página para exportar.');return;}
    const{jsPDF}=window.jspdf;
    const trimDims=TRIM[cfg.trimSize]||TRIM['6x9'];
    const PW=trimDims.w*72,PH=trimDims.h*72;
    const doc=new jsPDF({orientation:'portrait',unit:'pt',format:[PW,PH],compress:true});
    const total=wrappers.length;
    try{
      for(let i=0;i<total;i++){
        setPdfProgress({current:i+1,total,phase:`Capturando página ${i+1} de ${total}…`});
        await new Promise(r=>setTimeout(r,30));
        const wrap=wrappers[i];
        const pageEl=wrap.querySelector('page')||wrap;
        const PX_W=trimDims.pw,PX_H=trimDims.ph;
        const canvas=await html2canvas(pageEl,{
          scale:3,useCORS:true,allowTaint:true,backgroundColor:'#ffffff',
          width:PX_W,height:PX_H,windowWidth:PX_W,windowHeight:PX_H,logging:false,
          onclone:clonedDoc=>{
            [...document.querySelectorAll('link[rel=stylesheet],style')].forEach(s=>{
              if(s.tagName.toLowerCase()==='link'){const c=clonedDoc.createElement('link');c.rel='stylesheet';c.href=s.href;clonedDoc.head.appendChild(c);}
              else{const c=clonedDoc.createElement('style');c.textContent=s.textContent;clonedDoc.head.appendChild(c);}
            });
          },
        });
        const imgData=canvas.toDataURL('image/jpeg',0.97);
        if(i>0)doc.addPage([PW,PH],'portrait');
        doc.addImage(imgData,'JPEG',0,0,PW,PH,undefined,'FAST');
      }
      setPdfProgress({current:total,total,phase:'Salvando PDF…'});
      await new Promise(r=>setTimeout(r,80));
      const title=(cfg.title||'livro').replace(/[^a-z0-9áéíóúãõâêîôûàèçñ\s]/gi,'').trim()||'livro';
      doc.save(`${title}-kdp.pdf`);
    }finally{setPdfProgress(null);setShowPdf(false);}
  },[cfg]);

  const handleExportJpgs=useCallback(async()=>{
    const wrappers=document.querySelectorAll('.pg-wrap');
    if(!wrappers.length){setErr('Nenhuma página para exportar.');return;}
    setLoading(true);
    try{
      const trimDims=TRIM[cfg.trimSize]||TRIM['6x9'];
      const title=(cfg.title||'pagina').replace(/[^a-z0-9]/gi,'-');
      for(let i=0;i<wrappers.length;i++){
        const pageEl=wrappers[i].querySelector('page')||wrappers[i];
        const canvas=await html2canvas(pageEl,{
          scale:3,useCORS:true,allowTaint:true,backgroundColor:'#ffffff',
          width:trimDims.pw,height:trimDims.ph,windowWidth:trimDims.pw,windowHeight:trimDims.ph,logging:false,
          onclone:clonedDoc=>{
            [...document.querySelectorAll('link[rel=stylesheet],style')].forEach(s=>{
              if(s.tagName.toLowerCase()==='link'){const c=clonedDoc.createElement('link');c.rel='stylesheet';c.href=s.href;clonedDoc.head.appendChild(c);}
              else{const c=clonedDoc.createElement('style');c.textContent=s.textContent;clonedDoc.head.appendChild(c);}
            });
          },
        });
        canvas.toBlob(blob=>saveAs(blob,`${title}-pag${String(i+1).padStart(3,'0')}.jpg`),'image/jpeg',0.97);
        await new Promise(r=>setTimeout(r,40));
      }
    }finally{setLoading(false);}
  },[cfg]);

  const handleDocx=async()=>{if(!blocks)return;try{setLoading(true);await exportDocx(blocks,cfg);}catch(e){setErr('Erro DOCX: '+e.message);}finally{setLoading(false);}};

  const reset=()=>{
    setBlocks(null);setHtml(null);setPidx(0);
    db.set('kdp-blocks',null);db.set('kdp-html',null);db.set('kdp-pidx',0);
  };

  if(!blocks)return(
    <>
      <UploadScreen onFile={handleFile} loading={loading}/>
      {showApi&&<ApiModal onClose={()=>setShowApi(false)} apiKey={apiKey} setApiKey={setApiKey}/>}
      {err&&<ErrModal msg={err} onClose={()=>setErr(null)}/>}
    </>
  );

  return(
    <div className="app">
      <Sidebar cfg={cfg} setCfg={setCfg} blocks={blocks} processedIdx={pidx}
        aiLoading={aiLoading} onDiagram={doDiagram} onResume={handleResume}
        onApplyFix={handleFix} onPdf={()=>setShowPdf(true)} onDocx={handleDocx}
        onExportJpgs={handleExportJpgs} onApiKey={()=>setShowApi(true)} onNewFile={reset} onReset={reset}/>
      <Preview html={html} aiLoading={aiLoading} processedIdx={pidx} total={blocks.length}/>
      {aiLoading&&<div className="toast"><div className="spin"/>
        Diagramando... {blocks?Math.round((Math.max(pidx,1)/blocks.length)*100):0}%
      </div>}
      {showApi&&<ApiModal onClose={()=>setShowApi(false)} apiKey={apiKey} setApiKey={setApiKey}/>}
      {showPdf&&<PdfModal onClose={()=>{if(!pdfProgress)setShowPdf(false);}} onExport={exportPdfScreenshot} pdfProgress={pdfProgress}/>}
      {err&&<ErrModal msg={err} onClose={()=>setErr(null)}/>}
      {loading&&<div className="load-overlay">
        <div style={{textAlign:'center'}}>
          <div className="spin" style={{width:36,height:36,borderWidth:3,margin:'0 auto 12px'}}/>
          <p style={{fontFamily:'Playfair Display,serif',color:'#333'}}>Processando...</p>
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
